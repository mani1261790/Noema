      function createEmptyLearningProgressStore() {
        return {
          schemaVersion: 2,
          notebooks: {}
        };
      }

      function normalizeLearningProgressStore(rawStore) {
        const fallbackIso = new Date().toISOString();
        const normalized = createEmptyLearningProgressStore();
        const parsed = rawStore && typeof rawStore === "object" ? rawStore : {};
        const notebooks = parsed.notebooks && typeof parsed.notebooks === "object" ? parsed.notebooks : {};

        Object.entries(notebooks).forEach(([notebookId, value]) => {
          if (!notebookId) return;
          const record = value && typeof value === "object" ? value : {};
          const visitsRaw = Number(record.visits);
          const completed = Boolean(record.completed);
          normalized.notebooks[notebookId] = {
            visits: Number.isFinite(visitsRaw) && visitsRaw >= 0 ? Math.floor(visitsRaw) : 0,
            lastVisitedAt: toValidIsoString(record.lastVisitedAt || record.visitedAt, fallbackIso),
            completed,
            completedAt: completed
              ? toValidIsoString(record.completedAt || record.lastCompletedAt || record.lastVisitedAt, fallbackIso)
              : ""
          };
        });

        return normalized;
      }

      function readLocalLearningProgressStore() {
        const key = getLearningProgressStorageKey();
        const serialized = localStorage.getItem(key) || "";
        let parsed = {};
        try {
          parsed = serialized ? JSON.parse(serialized) : {};
        } catch {}
        const normalized = normalizeLearningProgressStore(parsed);
        try {
          const normalizedSerialized = JSON.stringify(normalized);
          if (normalizedSerialized !== serialized) {
            localStorage.setItem(key, normalizedSerialized);
          }
        } catch {}
        return normalized;
      }

      function writeLocalLearningProgressStore(nextStore) {
        const key = getLearningProgressStorageKey();
        try {
          const normalized = normalizeLearningProgressStore(nextStore);
          localStorage.setItem(key, JSON.stringify(normalized));
        } catch {}
      }

      function cloneLearningProgressStore(store) {
        return normalizeLearningProgressStore(store);
      }

      function readLearningProgressStore() {
        return cloneLearningProgressStore(state.learningProgressStore);
      }

      function storesDiffer(leftStore, rightStore) {
        try {
          return JSON.stringify(normalizeLearningProgressStore(leftStore)) !== JSON.stringify(normalizeLearningProgressStore(rightStore));
        } catch {
          return true;
        }
      }

      function mergeLearningProgressStores(baseStore, incomingStore) {
        const base = normalizeLearningProgressStore(baseStore);
        const incoming = normalizeLearningProgressStore(incomingStore);
        const merged = createEmptyLearningProgressStore();
        const notebookIds = new Set([
          ...Object.keys(base.notebooks || {}),
          ...Object.keys(incoming.notebooks || {})
        ]);

        notebookIds.forEach((notebookId) => {
          const baseRecord = base.notebooks[notebookId] || null;
          const incomingRecord = incoming.notebooks[notebookId] || null;
          if (!baseRecord && incomingRecord) {
            merged.notebooks[notebookId] = incomingRecord;
            return;
          }
          if (baseRecord && !incomingRecord) {
            merged.notebooks[notebookId] = baseRecord;
            return;
          }
          if (!baseRecord || !incomingRecord) return;

          const baseVisitedAt = Date.parse(baseRecord.lastVisitedAt || "");
          const incomingVisitedAt = Date.parse(incomingRecord.lastVisitedAt || "");
          const baseCompletedAt = Date.parse(baseRecord.completedAt || "");
          const incomingCompletedAt = Date.parse(incomingRecord.completedAt || "");
          const lastVisitedAt =
            (!Number.isNaN(baseVisitedAt) && !Number.isNaN(incomingVisitedAt) && incomingVisitedAt > baseVisitedAt) ||
            (Number.isNaN(baseVisitedAt) && !Number.isNaN(incomingVisitedAt))
              ? incomingRecord.lastVisitedAt
              : baseRecord.lastVisitedAt;
          const completed = Boolean(baseRecord.completed || incomingRecord.completed);
          const completedAt = completed
            ? (!Number.isNaN(baseCompletedAt) && !Number.isNaN(incomingCompletedAt) && incomingCompletedAt > baseCompletedAt) ||
              (Number.isNaN(baseCompletedAt) && !Number.isNaN(incomingCompletedAt))
                ? incomingRecord.completedAt
                : baseRecord.completedAt
            : "";

          merged.notebooks[notebookId] = {
            visits: Math.max(Number(baseRecord.visits || 0), Number(incomingRecord.visits || 0)),
            lastVisitedAt,
            completed,
            completedAt
          };
        });

        return merged;
      }

      function setLearningProgressStore(nextStore) {
        const normalized = normalizeLearningProgressStore(nextStore);
        state.learningProgressStore = normalized;
        state.learningProgressLoaded = true;
        writeLocalLearningProgressStore(normalized);
      }

      async function fetchLearningProgressStore() {
        const token = getToken();
        if (!token) {
          throw new Error("セッションが切れています。再ログインしてください。");
        }

        const response = await fetch(`${API_BASE}/api/learning-progress`, {
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        let payload = {};
        try {
          payload = await response.json();
        } catch {}

        if (!response.ok) {
          const message = payload && payload.error ? payload.error : "進捗の取得に失敗しました";
          throw new Error(String(message));
        }

        return normalizeLearningProgressStore(payload);
      }

      async function saveLearningProgressRecord(notebookId, record) {
        const trimmedNotebookId = String(notebookId || "").trim();
        if (!trimmedNotebookId) return;

        const normalizedRecord = normalizeLearningProgressStore({
          notebooks: {
            [trimmedNotebookId]: record
          }
        }).notebooks[trimmedNotebookId];

        const currentStore = readLearningProgressStore();
        currentStore.notebooks[trimmedNotebookId] = normalizedRecord;
        setLearningProgressStore(currentStore);
        if (state.activeNotebook && state.activeNotebook.id === trimmedNotebookId) {
          renderNotebookCompletionControl(trimmedNotebookId);
        } else if (!state.activeNotebook) {
          renderHomeDashboard();
        }

        if (!state.loggedIn) return;

        const token = getToken();
        if (!token) return;

        try {
          const response = await fetch(`${API_BASE}/api/learning-progress/${encodeURIComponent(trimmedNotebookId)}`, {
            method: "PUT",
            headers: {
              "content-type": "application/json",
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify(normalizedRecord)
          });

          let payload = {};
          try {
            payload = await response.json();
          } catch {}

          if (!response.ok) {
            const message = payload && payload.error ? payload.error : "進捗の保存に失敗しました";
            throw new Error(String(message));
          }

          setLearningProgressStore(payload);
          if (state.activeNotebook && state.activeNotebook.id === trimmedNotebookId) {
            renderNotebookCompletionControl(trimmedNotebookId);
          } else if (!state.activeNotebook) {
            renderHomeDashboard();
          }
        } catch (error) {
          console.warn("Learning progress sync failed", error);
        }
      }

      async function syncLearningProgressFromServer() {
        if (!state.loggedIn) {
          setLearningProgressStore(readLocalLearningProgressStore());
          return;
        }

        try {
          const remoteStore = await fetchLearningProgressStore();
          const localStore = readLocalLearningProgressStore();
          const mergedStore = mergeLearningProgressStores(remoteStore, localStore);
          setLearningProgressStore(mergedStore);

          if (storesDiffer(remoteStore, mergedStore)) {
            const notebookIds = Object.keys(mergedStore.notebooks || {});
            for (const notebookId of notebookIds) {
              const mergedRecord = mergedStore.notebooks[notebookId];
              const remoteRecord = remoteStore.notebooks[notebookId];
              if (!remoteRecord || storesDiffer({ notebooks: { [notebookId]: remoteRecord } }, { notebooks: { [notebookId]: mergedRecord } })) {
                await saveLearningProgressRecord(notebookId, mergedRecord);
              }
            }
          }
        } catch (error) {
          console.warn("Learning progress fetch failed", error);
          setLearningProgressStore(readLocalLearningProgressStore());
        }

        if (state.activeNotebook) {
          renderNotebookCompletionControl(state.activeNotebook.id);
        } else {
          renderHomeDashboard();
        }
      }

      async function markNotebookVisited(notebookId) {
        if (!notebookId) return;
        const store = readLearningProgressStore();
        const existing = store.notebooks[notebookId] || {
          visits: 0,
          lastVisitedAt: "",
          completed: false,
          completedAt: ""
        };
        const nextRecord = {
          visits: Math.max(1, Number(existing.visits || 0) + 1),
          lastVisitedAt: new Date().toISOString(),
          completed: Boolean(existing.completed),
          completedAt: existing.completed ? String(existing.completedAt || new Date().toISOString()) : ""
        };
        await saveLearningProgressRecord(notebookId, nextRecord);
      }

      function isNotebookCompleted(notebookId) {
        if (!notebookId) return false;
        const store = readLearningProgressStore();
        const record = store.notebooks[notebookId];
        return Boolean(record && record.completed);
      }

      async function setNotebookCompleted(notebookId, completed) {
        if (!notebookId) return;
        const store = readLearningProgressStore();
        const nowIso = new Date().toISOString();
        const existing = store.notebooks[notebookId] || {
          visits: 0,
          lastVisitedAt: nowIso,
          completed: false,
          completedAt: ""
        };
        const nextRecord = {
          visits: Math.max(0, Number(existing.visits || 0)),
          lastVisitedAt: String(existing.lastVisitedAt || nowIso),
          completed: Boolean(completed),
          completedAt: completed ? nowIso : ""
        };
        await saveLearningProgressRecord(notebookId, nextRecord);
      }

      function formatRelativeVisitTime(isoString) {
        const ts = Date.parse(String(isoString || ""));
        if (Number.isNaN(ts)) return "";
        const diffMs = Date.now() - ts;
        if (diffMs < 60 * 1000) return "たった今";
        if (diffMs < 60 * 60 * 1000) return `${Math.floor(diffMs / (60 * 1000))}分前`;
        if (diffMs < 24 * 60 * 60 * 1000) return `${Math.floor(diffMs / (60 * 60 * 1000))}時間前`;
        if (diffMs < 7 * 24 * 60 * 60 * 1000) return `${Math.floor(diffMs / (24 * 60 * 60 * 1000))}日前`;
        return new Date(ts).toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" });
      }

      function normalizeCellArray(cells) {
        if (!Array.isArray(cells)) return [];
        return cells.map((cell) => String(cell));
      }

      function hashFNV1a(text) {
        let hash = 2166136261;
        for (let i = 0; i < text.length; i += 1) {
          hash ^= text.charCodeAt(i);
          hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
        }
        return (hash >>> 0).toString(16).padStart(8, "0");
      }

      function makeBaseId(cells) {
        const normalized = normalizeCellArray(cells);
        const signature = normalized.join("\u241E");
        return `base:${hashFNV1a(signature)}:${normalized.length}`;
      }

      function makeRevisionId() {
        const randomPart = Math.random().toString(36).slice(2, 10);
        return `rev:${Date.now().toString(36)}:${randomPart}`;
      }

      function sameCells(a, b) {
        if (a.length !== b.length) return false;
        for (let i = 0; i < a.length; i += 1) {
          if (a[i] !== b[i]) return false;
        }
        return true;
      }

      function ensureBaseSnapshot(store, cells, createdAtIso) {
        const normalizedCells = normalizeCellArray(cells);
        const baseId = makeBaseId(normalizedCells);
        if (!store.bases[baseId]) {
          store.bases[baseId] = {
            cells: normalizedCells,
            createdAt: createdAtIso
          };
        }
        return baseId;
      }

      function latestCellsFromEntry(store, entry) {
        if (!entry || !Array.isArray(entry.revisions) || entry.revisions.length === 0) return [];
        const latest = entry.revisions[entry.revisions.length - 1];
        if (!latest || !latest.baseId) return [];
        const base = store.bases[latest.baseId];
        if (!base) return [];
        return normalizeCellArray(base.cells);
      }

      function prunePlaygroundStore(store) {
        const nowMs = Date.now();
        const conflictRetentionMs = CONFLICT_RETENTION_DAYS * 24 * 60 * 60 * 1000;
        const unreferencedBaseRetentionMs = UNREFERENCED_BASE_RETENTION_DAYS * 24 * 60 * 60 * 1000;

        Object.keys(store.notebooks).forEach((notebookId) => {
          const entry = store.notebooks[notebookId];
          if (!entry || !Array.isArray(entry.revisions)) {
            delete store.notebooks[notebookId];
            return;
          }
          entry.revisions.sort((a, b) => toEpochMillis(a.createdAt, nowMs) - toEpochMillis(b.createdAt, nowMs));
          if (entry.revisions.length > KEEP_LATEST_REVISIONS) {
            entry.revisions = entry.revisions.slice(-KEEP_LATEST_REVISIONS);
          }
          if (entry.revisions.length === 0) {
            delete store.notebooks[notebookId];
          }
        });

        const keptConflicts = [];
        if (Array.isArray(store.conflicts)) {
          store.conflicts.forEach((conflict) => {
            const createdAtMs = toEpochMillis(conflict.createdAt, nowMs);
            if (!createdAtMs || nowMs - createdAtMs > conflictRetentionMs) return;
            keptConflicts.push(conflict);
          });
        }
        store.conflicts = keptConflicts;

        const referencedBaseIds = new Set();
        Object.values(store.notebooks).forEach((entry) => {
          if (!entry || !Array.isArray(entry.revisions)) return;
          entry.revisions.forEach((revision) => {
            if (revision && typeof revision.baseId === "string" && revision.baseId) {
              referencedBaseIds.add(revision.baseId);
            }
          });
        });
        store.conflicts.forEach((conflict) => {
          if (conflict && typeof conflict.baseId === "string" && conflict.baseId) {
            referencedBaseIds.add(conflict.baseId);
          }
        });

        Object.keys(store.bases).forEach((baseId) => {
          if (referencedBaseIds.has(baseId)) return;
          const base = store.bases[baseId];
          const createdAtMs = toEpochMillis(base && base.createdAt, nowMs);
          if (!createdAtMs || nowMs - createdAtMs > unreferencedBaseRetentionMs) {
            delete store.bases[baseId];
          }
        });

        return store;
      }

      function normalizePlaygroundStore(rawStore) {
        const fallbackIso = new Date().toISOString();
        const normalized = createEmptyPlaygroundStore();
        const parsed = rawStore && typeof rawStore === "object" ? rawStore : {};

        if (parsed.schemaVersion === PLAYGROUND_STORE_SCHEMA_VERSION) {
          const bases = parsed.bases && typeof parsed.bases === "object" ? parsed.bases : {};
          Object.entries(bases).forEach(([baseId, baseValue]) => {
            if (!baseId) return;
            const record = baseValue && typeof baseValue === "object" ? baseValue : {};
            const cells = normalizeCellArray(record.cells);
            normalized.bases[baseId] = {
              cells,
              createdAt: toValidIsoString(record.createdAt, fallbackIso)
            };
          });

          const notebooks = parsed.notebooks && typeof parsed.notebooks === "object" ? parsed.notebooks : {};
          Object.entries(notebooks).forEach(([notebookId, notebookValue]) => {
            if (!notebookId) return;
            const record = notebookValue && typeof notebookValue === "object" ? notebookValue : {};
            const revisions = Array.isArray(record.revisions) ? record.revisions : [];
            const normalizedRevisions = revisions
              .map((revision) => {
                const item = revision && typeof revision === "object" ? revision : {};
                const baseId = String(item.baseId || "").trim();
                if (!baseId || !normalized.bases[baseId]) return null;
                return {
                  id: String(item.id || makeRevisionId()),
                  baseId,
                  createdAt: toValidIsoString(item.createdAt, fallbackIso)
                };
              })
              .filter(Boolean);
            if (normalizedRevisions.length) {
              normalized.notebooks[notebookId] = {
                revisions: normalizedRevisions
              };
            }
          });

          normalized.conflicts = Array.isArray(parsed.conflicts)
            ? parsed.conflicts
                .map((conflict) => {
                  const item = conflict && typeof conflict === "object" ? conflict : {};
                  const notebookId = String(item.notebookId || "").trim();
                  if (!notebookId) return null;
                  const baseId = String(item.baseId || "").trim();
                  return {
                    id: String(item.id || `conflict:${makeRevisionId()}`),
                    notebookId,
                    baseId: baseId || undefined,
                    reason: String(item.reason || "unknown"),
                    createdAt: toValidIsoString(item.createdAt, fallbackIso)
                  };
                })
                .filter(Boolean)
            : [];
          return prunePlaygroundStore(normalized);
        }

        Object.entries(parsed).forEach(([notebookId, notebookValue]) => {
          if (!notebookId || notebookId === "schemaVersion" || notebookId === "notebooks" || notebookId === "bases" || notebookId === "conflicts") {
            return;
          }
          const record = notebookValue && typeof notebookValue === "object" ? notebookValue : {};
          const cells = normalizeCellArray(record.cells);
          const createdAt = toValidIsoString(record.updatedAt, fallbackIso);
          const baseId = ensureBaseSnapshot(normalized, cells, createdAt);
          normalized.notebooks[notebookId] = {
            revisions: [
              {
                id: makeRevisionId(),
                baseId,
                createdAt
              }
            ]
          };
        });

        return prunePlaygroundStore(normalized);
      }

      function readPlaygroundStore() {
        const key = getPlaygroundStorageKey();
        if (!key) return createEmptyPlaygroundStore();
        const serialized = localStorage.getItem(key) || "";
        let parsed = {};
        try {
          parsed = serialized ? JSON.parse(serialized) : {};
        } catch {}
        const normalized = normalizePlaygroundStore(parsed);
        try {
          const normalizedSerialized = JSON.stringify(normalized);
          if (serialized !== normalizedSerialized) {
            localStorage.setItem(key, normalizedSerialized);
          }
        } catch {}
        return normalized;
      }

      function writePlaygroundStore(nextStore) {
        const key = getPlaygroundStorageKey();
        if (!key) return;
        try {
          const normalized = normalizePlaygroundStore(nextStore);
          localStorage.setItem(key, JSON.stringify(normalized));
        } catch {}
      }

      function collectBaseCellSources() {
        return Array.from(state.baseCellSourceMap.keys())
          .sort((a, b) => a - b)
          .map((index) => String(state.baseCellSourceMap.get(index) || ""));
      }

      function mergeDraftOntoBase(baseCells, draftCells) {
        const normalizedBase = normalizeCellArray(baseCells);
        const normalizedDraft = normalizeCellArray(draftCells);
        const maxLength = Math.max(normalizedBase.length, normalizedDraft.length);
        const merged = normalizedBase.slice();
        let hasChanges = false;

        for (let index = 0; index < maxLength; index += 1) {
          if (index >= normalizedDraft.length) continue;
          const baseSource = index < normalizedBase.length ? normalizedBase[index] : "";
          const draftSource = normalizedDraft[index];
          if (draftSource !== baseSource) {
            hasChanges = true;
            merged[index] = draftSource;
          }
        }

        return { merged, hasChanges };
      }

      function readNotebookPlaygroundDraft(notebookId, baseCells = []) {
        if (!notebookId) return [];
        const store = readPlaygroundStore();
        const entry = store.notebooks[notebookId];
        const latestDraftCells = latestCellsFromEntry(store, entry);
        const normalizedBase = normalizeCellArray(baseCells);
        if (!normalizedBase.length) return latestDraftCells;

        const { merged, hasChanges } = mergeDraftOntoBase(normalizedBase, latestDraftCells);
        if (hasChanges) return merged;

        if (store.notebooks[notebookId]) {
          delete store.notebooks[notebookId];
          writePlaygroundStore(store);
        }
        return [];
      }

      function writeNotebookPlaygroundDraft(notebookId, cells, baseCells = []) {
        if (!notebookId) return;
        const normalized = normalizeCellArray(cells);
        const normalizedBase = normalizeCellArray(baseCells);
        const store = readPlaygroundStore();
        const entry = store.notebooks[notebookId] || { revisions: [] };
        const latestCells = latestCellsFromEntry(store, entry);

        if (normalizedBase.length && sameCells(normalized, normalizedBase)) {
          if (store.notebooks[notebookId]) {
            delete store.notebooks[notebookId];
            writePlaygroundStore(store);
          }
          return;
        }
        if (sameCells(latestCells, normalized)) return;

        const createdAt = new Date().toISOString();
        const baseId = ensureBaseSnapshot(store, normalized, createdAt);
        entry.revisions = Array.isArray(entry.revisions) ? entry.revisions : [];
        entry.revisions.push({
          id: makeRevisionId(),
          baseId,
          createdAt
        });
        store.notebooks[notebookId] = entry;
        writePlaygroundStore(store);
      }

      function clearNotebookPlaygroundDraft(notebookId) {
        if (!notebookId) return;
        const store = readPlaygroundStore();
        if (!(notebookId in store.notebooks)) return;
        delete store.notebooks[notebookId];
        writePlaygroundStore(store);
      }

      function collectEditableCellSources() {
        return Array.from(state.activeEditorMap.keys())
          .sort((a, b) => a - b)
          .map((index) => {
            const editor = state.activeEditorMap.get(index);
            return editor ? String(editor.value || "") : "";
          });
      }

      function schedulePlaygroundAutosave() {
        if (!state.loggedIn || !state.playgroundEnabled || !state.activeNotebook) return;
        if (state.playgroundSaveTimer) {
          clearTimeout(state.playgroundSaveTimer);
        }
        state.playgroundSaveTimer = setTimeout(() => {
          state.playgroundSaveTimer = null;
          if (!state.activeNotebook) return;
          writeNotebookPlaygroundDraft(
            state.activeNotebook.id,
            collectEditableCellSources(),
            collectBaseCellSources()
          );
        }, 320);
      }

      function applyEditorSourcesForCurrentMode() {
        if (!state.activeEditorMap.size) return;
        const notebookId = state.activeNotebook ? state.activeNotebook.id : "";
        const drafts =
          state.playgroundEnabled && notebookId
            ? readNotebookPlaygroundDraft(notebookId, collectBaseCellSources())
            : [];

        Array.from(state.activeEditorMap.entries()).forEach(([index, editor]) => {
          const baseSource = state.baseCellSourceMap.get(index) ?? normalizeRunnableSource(editor.value || "");
          const draftSource =
            drafts[index] !== undefined ? normalizeRunnableSource(drafts[index]) : baseSource;
          const source = state.playgroundEnabled ? draftSource : baseSource;

          editor.value = source;
          autosizeCodeEditor(editor);

          const code = el.notebookContent.querySelector(`pre[data-noema-cell-index="${index}"] > code`);
          if (code) {
            code.textContent = source;
          }

          const wrapper = code && code.closest ? code.closest(".code-runner") : null;
          const runButton = wrapper ? wrapper.querySelector(".run-code") : null;
          if (runButton) {
            runButton.classList.remove("is-done", "is-failed", "is-running");
          }
        });
      }

      function applyPlaygroundModeToCurrentNotebook() {
        const wrappers = el.notebookContent.querySelectorAll(".code-runner");
        wrappers.forEach((wrapper) => {
          wrapper.classList.toggle("playground-active", state.playgroundEnabled);
        });
        if (state.playgroundEnabled) {
          Array.from(state.activeEditorMap.values()).forEach((editor) => {
            autosizeCodeEditor(editor);
          });
        }
      }

      function renderPlaygroundHeaderControls() {
        const showReset = state.loggedIn && state.playgroundEnabled && !!state.activeNotebook;
        el.headerTitle.classList.remove("is-hidden");
        el.headerTitleSelect.classList.add("is-hidden");
        el.headerTitleSelect.disabled = true;
        el.resetPlayground.classList.toggle("is-hidden", !showReset);
        if (el.playgroundNotice) {
          el.playgroundNotice.classList.toggle("visible", showReset);
        }
      }

      function setElementVisibility(target, visible) {
        if (!target) return;
        target.classList.toggle("is-hidden", !visible);
        target.hidden = !visible;
        target.setAttribute("aria-hidden", visible ? "false" : "true");
      }

      function hidePrivilegedSidebarControls() {
        setElementVisibility(el.playgroundLink, false);
        setElementVisibility(el.playgroundLinkMobile, false);
        setElementVisibility(el.adminLink, false);
        setElementVisibility(el.adminLinkMobile, false);
      }

      function isCompactMobileView() {
        return window.innerWidth <= 960;
      }

      function renderPlaygroundSidebarControls() {
        const visible = state.loggedIn;
        const showMobilePrivileged = !isCompactMobileView();
        setElementVisibility(el.playgroundLink, visible);
        setElementVisibility(el.playgroundLinkMobile, visible && showMobilePrivileged);
        const label = state.playgroundEnabled ? "プレイグラウンド終了" : "プレイグラウンド";
        el.playgroundLink.textContent = label;
        el.playgroundLinkMobile.textContent = label;
      }

      function populateHeaderNotebookSelect() {
        const chapters = notebookList();
        const options = [];
        chapters.forEach((chapter) => {
          chapter.notebooks.forEach((notebook) => {
            options.push(
              `<option value="${notebook.id}">${escapeHtml(`${chapter.title} / ${notebook.title}`)}</option>`
            );
          });
        });
        el.headerTitleSelect.innerHTML = options.join("");
        if (state.activeNotebook) {
          el.headerTitleSelect.value = state.activeNotebook.id;
        }
      }

      async function setPlaygroundEnabled(nextEnabled) {
        if (nextEnabled && !state.loggedIn) {
          window.location.href = "/login";
          return;
        }
        state.playgroundEnabled = Boolean(nextEnabled);
        applyEditorSourcesForCurrentMode();
        renderHeader();
        renderPlaygroundSidebarControls();
        renderPlaygroundHeaderControls();
        applyPlaygroundModeToCurrentNotebook();
        await applySyntaxHighlight(el.notebookContent);
      }

      async function updateAdminVisibility(token) {
        const seq = ++state.authCheckSeq;
        state.isAdmin = false;
        setElementVisibility(el.adminLink, false);
        setElementVisibility(el.adminLinkMobile, false);

        try {
          const response = await fetch(`${API_BASE}/api/me`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (!response.ok) return;

          const payload = await response.json();
          if (seq !== state.authCheckSeq) return;

          state.isAdmin = Boolean(payload && payload.isAdmin);
          if (state.isAdmin) {
            setElementVisibility(el.adminLink, true);
            setElementVisibility(el.adminLinkMobile, !isCompactMobileView());
          }
        } catch {
          // keep hidden when check fails
        }
      }

      function updateAuthState() {
        hidePrivilegedSidebarControls();
        const token = getToken();
        state.loggedIn = Boolean(token);
        state.userScopeKey = token ? resolveUserScopeKey(token) : "";

        if (state.loggedIn) {
          state.learningProgressLoaded = false;
          state.llmSettings = readLlmSettings();
          syncLlmSettingsUi();
          [el.loginLink, el.loginLinkMobile].forEach((link) => {
            if (!link) return;
            link.textContent = "ログアウト";
            link.href = "#";
            link.onclick = function (event) {
              event.preventDefault();
              localStorage.removeItem(TOKEN_KEY);
              setSidebarOverlayOpen(false);
              updateAuthState();
              showHomeDashboard();
            };
          });
          syncChatFabState();
          void updateAdminVisibility(token);
          void syncLearningProgressFromServer();
          if (state.activeNotebook) {
            void preloadNotebookPackages(el.notebookContent, state.activeNotebook.id);
          }
          renderPlaygroundSidebarControls();
          renderPlaygroundHeaderControls();
          return;
        }

        state.authCheckSeq += 1;
        state.isAdmin = false;
        state.chatOpen = false;
        state.playgroundEnabled = false;
        setLearningProgressStore(readLocalLearningProgressStore());
        state.llmSettings = normalizeLlmSettings({});
        syncLlmSettingsUi();
        applyEditorSourcesForCurrentMode();
        applyPlaygroundModeToCurrentNotebook();
        closeMobileChatOverlay();
        el.assistantPanel.classList.add("hidden");
        el.resizer.classList.remove("visible");
        syncChatFabState();
        setElementVisibility(el.adminLink, false);
        setElementVisibility(el.adminLinkMobile, false);
        preloadedNotebookPackages.clear();
        state.activeEditorMap = new Map();
        state.baseCellSourceMap = new Map();
        if (state.playgroundSaveTimer) {
          clearTimeout(state.playgroundSaveTimer);
          state.playgroundSaveTimer = null;
        }

        [el.loginLink, el.loginLinkMobile].forEach((link) => {
          if (!link) return;
          link.textContent = "ログイン";
          link.href = "/login";
          link.onclick = null;
        });
        renderPlaygroundSidebarControls();
        renderPlaygroundHeaderControls();
      }

      function notebookList() {
        const chapters = state.catalog?.chapters || [];
        return chapters
          .slice()
          .sort((a, b) => a.order - b.order)
          .map((chapter) => ({
            ...chapter,
            audience: inferChapterAudience(chapter),
            notebooks: chapter.notebooks.slice().sort(compareNotebookOrder)
          }));
      }

      function parseExternalNotebookSourceLocation(notebook) {
        const originalUrl = String(notebook && notebook.source && notebook.source.originalUrl ? notebook.source.originalUrl : "");
        const nestedMatch = originalUrl.match(/\/tutorials\/([^/]+)\/student\/([^/.]+)\.ipynb$/i);
        if (nestedMatch) {
          return {
            folder: nestedMatch[1],
            fileStem: nestedMatch[2]
          };
        }

        const rootMatch = originalUrl.match(/\/tutorials\/student\/([^/.]+)\.ipynb$/i);
        if (rootMatch) {
          return {
            folder: "student",
            fileStem: rootMatch[1]
          };
        }

        return null;
      }

      function externalNotebookFolderSortKey(folder) {
        const normalized = String(folder || "").trim();
        if (normalized === "student") return [0, 0, 0, normalized];

        const weekDayMatch = normalized.match(/^W(\d+)D(\d+)_/i);
        if (weekDayMatch) {
          return [1, Number(weekDayMatch[1]), Number(weekDayMatch[2]), normalized];
        }

        if (/^Module_WrapUps$/i.test(normalized)) return [2, 0, 0, normalized];
        if (/^Bonus_/i.test(normalized)) return [3, 0, 0, normalized];
        return [4, 0, 0, normalized];
      }

      function externalNotebookFileSortRank(fileStem) {
        const normalized = String(fileStem || "").trim();
        const lower = normalized.toLowerCase();

        if (lower === "intro" || /_intro$/i.test(normalized)) return 0;
        if (lower === "intro_vid") return 1;

        const tutorialMatch = normalized.match(/tutorial(\d+)/i);
        if (tutorialMatch) return 10 + Number(tutorialMatch[1]);

        if (/bonuslecture/i.test(normalized)) return 80;
        if (lower === "outro" || /_outro$/i.test(normalized)) return 90;
        if (lower === "outro_vid") return 91;
        if (/daysummary/i.test(normalized)) return 99;
        return 50;
      }

      function compareNotebookOrder(a, b) {
        const aExternal = Boolean(a && a.source && a.source.kind === "open-license-translation");
        const bExternal = Boolean(b && b.source && b.source.kind === "open-license-translation");

        if (aExternal && bExternal) {
          const sourceA = parseExternalNotebookSourceLocation(a);
          const sourceB = parseExternalNotebookSourceLocation(b);
          if (sourceA && sourceB) {
            const folderA = externalNotebookFolderSortKey(sourceA.folder);
            const folderB = externalNotebookFolderSortKey(sourceB.folder);

            for (let index = 0; index < folderA.length; index += 1) {
              if (folderA[index] < folderB[index]) return -1;
              if (folderA[index] > folderB[index]) return 1;
            }

            const fileRankA = externalNotebookFileSortRank(sourceA.fileStem);
            const fileRankB = externalNotebookFileSortRank(sourceB.fileStem);
            if (fileRankA !== fileRankB) return fileRankA - fileRankB;

            const fileNameOrder = sourceA.fileStem.localeCompare(sourceB.fileStem);
            if (fileNameOrder !== 0) return fileNameOrder;
          }
        }

        return Number(a && a.order ? a.order : 0) - Number(b && b.order ? b.order : 0);
      }

      function inferChapterAudience(chapter) {
        const rawAudience = String(chapter && chapter.audience ? chapter.audience : "").trim().toLowerCase();
        if (rawAudience === "beginner" || rawAudience === "advanced") return rawAudience;

        const normalizedId = String(chapter && chapter.id ? chapter.id : "").trim().toLowerCase();
        const normalizedTitle = String(chapter && chapter.title ? chapter.title : "").trim().toLowerCase();
        if (
          normalizedId === "python" ||
          normalizedId === "machine-learning" ||
          normalizedTitle === "python" ||
          normalizedTitle === "機械学習"
        ) {
          return "beginner";
        }
        return "advanced";
      }

      function notebookSections() {
        const chapters = notebookList();
        const beginnerChapters = chapters.filter((chapter) => String(chapter.audience || "") === "beginner");
        const advancedChapters = chapters.filter((chapter) => String(chapter.audience || "advanced") !== "beginner");

        return [
          {
            id: "beginner",
            title: "初学者向け",
            description: "Python と機械学習の基礎から始める教材です。",
            chapters: beginnerChapters
          },
          {
            id: "advanced",
            title: "上級者向け",
            description: "ディープラーニング以降の発展トピックです。",
            chapters: advancedChapters
          }
        ].filter((section) => section.chapters.length > 0);
      }

      function notebookSourceKindLabel(source) {
        const kind = String(source && source.kind ? source.kind : "noema-original");
        if (kind === "open-license-translation") return "翻訳教材";
        return "";
      }

      function chapterSourceGroup(chapter) {
        const notebooks = Array.isArray(chapter && chapter.notebooks) ? chapter.notebooks : [];
        if (!notebooks.length) return "noema";
        return notebooks.some((notebook) => isExternalTranslatedNotebook(notebook)) ? "external" : "noema";
      }

      function filterChaptersBySourceGroup(chapters, group) {
        return (Array.isArray(chapters) ? chapters : [])
          .map((chapter) => ({
            ...chapter,
            notebooks: (Array.isArray(chapter && chapter.notebooks) ? chapter.notebooks : []).filter((notebook) =>
              group === "external" ? isExternalTranslatedNotebook(notebook) : !isExternalTranslatedNotebook(notebook)
            )
          }))
          .filter((chapter) => chapter.notebooks.length > 0);
      }

      function chapterProviderLabel(chapter) {
        const notebooks = Array.isArray(chapter && chapter.notebooks) ? chapter.notebooks : [];
        const providers = Array.from(
          new Set(
            notebooks
              .map((notebook) => String(notebook && notebook.source && notebook.source.provider ? notebook.source.provider : "").trim())
              .filter(Boolean)
          )
        );
        return providers[0] || "External";
      }

      function isExternalTranslatedNotebook(notebook) {
        return Boolean(notebook && notebook.source && notebook.source.kind === "open-license-translation");
      }

      function renderNotebookSidebarMeta(notebook) {
        if (!isExternalTranslatedNotebook(notebook)) return "";

        const badge = notebookSourceKindLabel(notebook.source);
        const provider = String((notebook.source && notebook.source.provider) || "").trim();
        const license = String((notebook.source && notebook.source.license) || "").trim();
        const parts = [provider, license].filter(Boolean);

        return `
          <span class="nb-item-main">
            <span class="nb-item-title">${escapeHtml(notebook.title)}</span>
            ${badge ? `<span class="nb-item-badge">${escapeHtml(badge)}</span>` : ""}
          </span>
          ${parts.length ? `<span class="nb-item-sub">${escapeHtml(parts.join(" / "))}</span>` : ""}
        `;
      }

      function renderNotebookAttributionBanner(notebook) {
        if (!isExternalTranslatedNotebook(notebook)) return "";

        const source = notebook.source || {};
        const provider = String(source.provider || "").trim();
        const license = String(source.license || "").trim();
        const originalTitle = String(source.originalTitle || notebook.title || "").trim();
        const originalUrl = String(source.originalUrl || "").trim();
        const translationLanguage = String(source.translationLanguage || "日本語").trim();
        const titleHtml = originalUrl

      function matchNotebook(notebook, query) {
        if (!query) return true;
        const hay = `${notebook.title} ${notebook.id} ${(notebook.tags || []).join(" ")}`.toLowerCase();

      function buildProgressGroupSummary(title, description, chapters, completedNotebookSet) {
        const safeChapters = Array.isArray(chapters) ? chapters : [];
        const notebooks = safeChapters.flatMap((chapter) => (Array.isArray(chapter.notebooks) ? chapter.notebooks : []));
        const total = notebooks.length;
        const completed = notebooks.reduce((count, notebook) => count + (completedNotebookSet.has(notebook.id) ? 1 : 0), 0);
        const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
        const chapterSummaries = safeChapters
          .map((chapter) => {
            const chapterNotebooks = Array.isArray(chapter.notebooks) ? chapter.notebooks : [];
            const chapterTotal = chapterNotebooks.length;
            const chapterCompleted = chapterNotebooks.reduce(
              (count, notebook) => count + (completedNotebookSet.has(notebook.id) ? 1 : 0),
              0
            );
            const chapterPercent = chapterTotal > 0 ? Math.round((chapterCompleted / chapterTotal) * 100) : 0;
            return {
              title: chapter.title,
              total: chapterTotal,
              completed: chapterCompleted,
              percent: chapterPercent
            };
          })
          .filter((chapter) => chapter.total > 0);

        return {
          title,
          description,
          total,
          completed,
          percent,
          chapterCount: chapterSummaries.length,
          chapterSummaries
        };
      }
