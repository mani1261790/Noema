<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noema</title>
  <meta name="theme-color" content="#071225" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Noema" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/highlight/atom-one-dark.min.css" />
  <link rel="stylesheet" href="/katex/katex.min.css" />
  <style>
    :root {
      --bg-0: #071225;
      --bg-1: #0f2238;
      --bg-2: #1a2f44;
      --text: #ebf3ff;
      --muted: #9db3cf;
      --panel: rgba(10, 18, 33, 0.52);
      --panel-strong: rgba(12, 21, 40, 0.74);
      --panel-soft: rgba(12, 23, 43, 0.36);
      --border: rgba(145, 183, 227, 0.33);
      --accent: #71aabd;
      --accent-strong: #5b8ea2;
      --input-bg: rgba(21,34,56,.66);
      --shadow: 0 30px 66px rgba(2, 7, 16, 0.58), inset 0 1px 0 rgba(166,205,255,.16);
      --glass-edge: rgba(148, 189, 234, .34);
      --glass-edge-soft: rgba(148, 189, 234, .2);
      --glass-highlight: rgba(198, 223, 255, .16);
      --glass-shadow: 0 24px 44px rgba(3, 8, 17, .42);
      --code-bg: #282c34;
      --code-fg: #d8e8ff;
      --code-border: rgba(116, 171, 232, .26);
      --brand-font: "Space Grotesk", "Avenir Next", "SF Pro Display", "Helvetica Neue", sans-serif;
      --assistant-width: 400px;
      --mobile-dock-button-size: 46px;
      --mobile-dock-gap: 6px;
      --mobile-dock-pad: 4px;
      --mobile-dock-right: max(12px, calc(env(safe-area-inset-right) + 8px));
      --mobile-dock-bottom: max(12px, calc(env(safe-area-inset-bottom) + 8px));
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      position: relative;
      background:
        radial-gradient(circle at 12% 12%, color-mix(in oklab, var(--accent) 20%, transparent), transparent 44%),
        radial-gradient(circle at 88% 5%, rgba(255, 155, 96, 0.16), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(109, 196, 255, 0.2), transparent 45%),
        linear-gradient(155deg, var(--bg-0) 0%, var(--bg-1) 48%, var(--bg-2) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 20% 22%, rgba(255, 255, 255, .16), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(127, 206, 255, .15), transparent 36%);
      filter: blur(22px);
      opacity: .85;
    }

    body::after {
      background:
        linear-gradient(160deg, rgba(255,255,255,.08), transparent 36%),
        linear-gradient(332deg, rgba(255,255,255,.04), transparent 44%);
    }

    a { color: inherit; text-decoration: none; }

    .glass-strong {
      background:
        linear-gradient(145deg, color-mix(in oklab, var(--glass-highlight) 66%, transparent), transparent 42%),
        linear-gradient(328deg, color-mix(in oklab, var(--panel-strong) 88%, transparent), color-mix(in oklab, var(--panel) 76%, transparent));
      border: 1px solid var(--glass-edge);
      backdrop-filter: blur(22px) saturate(155%);
      -webkit-backdrop-filter: blur(22px) saturate(155%);
      box-shadow:
        var(--glass-shadow),
        inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 88%, transparent),
        inset 0 -1px 0 color-mix(in oklab, var(--glass-edge-soft) 70%, transparent);
    }

    .glass-soft {
      background:
        linear-gradient(150deg, color-mix(in oklab, var(--glass-highlight) 54%, transparent), transparent 52%),
        color-mix(in oklab, var(--panel-soft) 90%, transparent);
      border: 1px solid var(--glass-edge-soft);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      box-shadow:
        0 8px 18px color-mix(in oklab, var(--shadow) 28%, transparent),
        inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 72%, transparent);
    }

    .button {
      border: 1px solid color-mix(in oklab, var(--accent) 52%, white);
      color: color-mix(in oklab, #f7fbff 88%, var(--text));
      background:
        linear-gradient(
          145deg,
          color-mix(in oklab, var(--accent) 58%, var(--panel-strong)) 0%,
          color-mix(in oklab, var(--accent-strong) 62%, var(--panel-soft)) 100%
        );
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      box-shadow:
        0 10px 22px color-mix(in oklab, var(--accent) 18%, transparent),
        inset 0 1px 0 rgba(255,255,255,.26);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .button-ghost {
      border: 1px solid var(--glass-edge-soft);
      background:
        linear-gradient(155deg, color-mix(in oklab, var(--glass-highlight) 58%, transparent), transparent 60%),
        color-mix(in oklab, var(--panel-soft) 92%, transparent);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      box-shadow:
        inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 70%, transparent),
        0 6px 14px color-mix(in oklab, var(--shadow) 26%, transparent);
    }

    /* Liquid Glass Navigation */
    .liquid-glass-navigation {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
    }

    .liquid-nav {
      background:
        linear-gradient(148deg, color-mix(in oklab, var(--glass-highlight) 40%, transparent), transparent 58%),
        color-mix(in oklab, var(--panel-soft) 82%, transparent);
      backdrop-filter: blur(18px) saturate(1.55);
      -webkit-backdrop-filter: blur(18px) saturate(1.55);
      border: 1px solid var(--glass-edge-soft);
      border-radius: 50px;
      padding: 8px;
      display: flex;
      gap: 4px;
      width: max-content;
      box-shadow:
        inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 82%, transparent),
        0 16px 30px color-mix(in oklab, var(--shadow) 34%, transparent);
    }

    .nav-item {
      padding: 8px 16px;
      border-radius: 50px;
      color: color-mix(in oklab, var(--text) 88%, white);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      border: 0;
      background: transparent;
      cursor: pointer;
      line-height: 1.1;
      font-family: inherit;
    }

    .nav-item:hover {
      background: color-mix(in oklab, var(--panel-strong) 88%, transparent);
      transform: translateY(-1px);
    }

    .nav-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: color-mix(in oklab, var(--glass-highlight) 72%, transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .nav-item:hover::before {
      opacity: 1;
    }

    .layout {
      height: 100dvh;
      max-width: 1900px;
      margin: 0 auto;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      position: relative;
      z-index: 1;
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) auto auto;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .sidebar {
      border-radius: 24px;
      padding: 12px;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar h1 {
      font-family: var(--brand-font);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin: 8px 8px 4px;
      line-height: 1.15;
      color: var(--text);
      text-shadow: 0 8px 20px color-mix(in oklab, var(--accent) 24%, transparent);
    }

    .brand-link {
      display: inline-block;
      text-decoration: none;
      color: inherit;
      border-radius: 10px;
      padding: 2px 4px;
      outline: none;
    }

    .brand-link:focus-visible {
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 28%, transparent);
    }

    @supports ((background-clip: text) or (-webkit-background-clip: text)) {
      .sidebar h1 {
        background: linear-gradient(
          135deg,
          color-mix(in oklab, var(--accent) 78%, white) 0%,
          color-mix(in oklab, var(--text) 72%, var(--accent)) 60%,
          color-mix(in oklab, var(--accent-strong) 66%, var(--text)) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
    }

    .search {
      border: 1px solid var(--glass-edge-soft);
      background:
        linear-gradient(145deg, color-mix(in oklab, var(--glass-highlight) 46%, transparent), transparent 56%),
        var(--input-bg);
      border-radius: 12px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      margin: 0 4px;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      box-shadow: inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 70%, transparent);
    }

    .search input {
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      width: 100%;
    }

    .search-icon {
      width: 14px;
      height: 14px;
      display: block;
      stroke: var(--muted);
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .88;
    }

    #sidebar-list,
    #sidebar-mobile-list {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      display: block;
      padding-right: 4px;
      overscroll-behavior: contain;
      scrollbar-gutter: stable both-edges;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    #sidebar-list::-webkit-scrollbar,
    #sidebar-mobile-list::-webkit-scrollbar,
    .overlay-scroll::-webkit-scrollbar {
      display: none;
    }

    .chapter {
      flex: 0 0 auto;
      border-radius: 14px;
      overflow: hidden;
    }

    .chapter + .chapter {
      margin-top: 8px;
    }

    .chapter-section + .chapter-section {
      margin-top: 22px;
      padding-top: 14px;
      border-top: 1px solid color-mix(in oklab, var(--glass-edge-soft) 86%, transparent);
    }

    .sidebar-library + .sidebar-library {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid color-mix(in oklab, var(--glass-edge-soft) 92%, transparent);
    }

    .sidebar-library-title {
      display: block;
      margin: 0 0 6px;
      padding: 0 2px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .04em;
      color: color-mix(in oklab, var(--text) 94%, white);
    }

    .sidebar-library-description {
      margin: 0 0 12px;
      padding: 0 2px;
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
    }

    .chapter-section-label {
      display: block;
      margin: 0 0 8px;
      padding: 0 2px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: color-mix(in oklab, var(--muted) 92%, white);
    }

    .chapter-section-description {
      margin: 0 0 10px;
      padding: 0 2px;
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
    }

    .chapter-section-stack {
      display: grid;
      gap: 8px;
    }

    .chapter-toggle {
      width: 100%;
      border: 1px solid color-mix(in oklab, var(--glass-edge-soft) 76%, transparent);
      background:
        linear-gradient(152deg, color-mix(in oklab, var(--glass-highlight) 44%, transparent), transparent 58%),
        color-mix(in oklab, var(--panel-soft) 72%, transparent);
      color: var(--text);
      display: flex;
      gap: 10px;
      justify-content: flex-start;
      align-items: center;
      padding: 10px 10px 10px 12px;
      font-weight: 650;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      border-radius: 11px;
      transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
    }

    .chapter-toggle:hover {
      background: color-mix(in oklab, var(--panel-strong) 85%, transparent);
      border-color: color-mix(in oklab, var(--accent) 28%, var(--border));
    }

    .chapter-toggle:focus-visible {
      outline: none;
      border-color: color-mix(in oklab, var(--accent) 65%, white);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 24%, transparent);
    }

    .chapter-toggle[aria-expanded="true"] {
      background: color-mix(in oklab, var(--panel-strong) 96%, transparent);
      border-color: color-mix(in oklab, var(--accent) 26%, var(--border));
    }

    .chapter-title {
      flex: 1 1 auto;
      min-width: 0;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .chapter-arrow {
      margin-left: auto;
      flex: 0 0 24px;
      min-width: 24px;
      min-height: 24px;
      overflow: visible;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 1px solid color-mix(in oklab, var(--accent) 22%, var(--border));
      background:
        radial-gradient(circle at 30% 28%, color-mix(in oklab, var(--panel-strong) 78%, transparent), transparent 64%),
        color-mix(in oklab, var(--panel-soft) 68%, transparent);
      color: color-mix(in oklab, var(--accent) 62%, var(--text));
      transition:
        transform 180ms ease,
        color 180ms ease,
        background 180ms ease,
        border-color 180ms ease;
    }

    .chapter-arrow svg {
      width: 12px;
      height: 12px;
      display: block;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chapter-arrow.expanded {
      transform: rotate(90deg);
      color: #fff;
      border-color: color-mix(in oklab, var(--accent) 66%, white);
      background: linear-gradient(145deg, var(--accent) 0%, var(--accent-strong) 100%);
    }

    .chapter-items {
      border-top: 1px solid var(--glass-edge-soft);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: min(44vh, 420px);
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      background: color-mix(in oklab, var(--panel-soft) 48%, transparent);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nb-item {
      border: 1px solid transparent;
      border-radius: 10px;
      background: color-mix(in oklab, var(--panel-soft) 46%, transparent);
      text-align: left;
      color: var(--muted);
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 56%, transparent);
    }

    .nb-item-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .nb-item-title {
      display: block;
      min-width: 0;
      color: inherit;
    }

    .nb-item-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      color: color-mix(in oklab, var(--accent) 72%, white);
      border: 1px solid color-mix(in oklab, var(--accent) 34%, var(--glass-edge-soft));
      background: color-mix(in oklab, var(--accent) 12%, transparent);
      white-space: nowrap;
    }

    .nb-item-sub {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      line-height: 1.45;
      color: color-mix(in oklab, var(--muted) 92%, white);
    }

    .nb-item:hover {
      background: color-mix(in oklab, var(--panel-strong) 88%, transparent);
      border-color: color-mix(in oklab, var(--glass-edge-soft) 74%, transparent);
      color: var(--text);
    }
    .nb-item.active {
      color: #fff;
      border-color: color-mix(in oklab, var(--accent) 68%, white);
      background: linear-gradient(145deg, color-mix(in oklab, var(--accent) 80%, white), color-mix(in oklab, var(--accent-strong) 88%, black));
      box-shadow: 0 10px 20px color-mix(in oklab, var(--accent) 30%, transparent);
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 10px 8px 6px;
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-footer .button:not(.is-hidden),
    .sidebar-footer .button-ghost:not(.is-hidden) {
      display: block;
      width: 100%;
      text-align: center;
    }

    .footer-link:not(.is-hidden) {
      display: block;
      text-align: center;
    }

    .main {
      min-width: 0;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--glass-edge-soft);
      padding: 10px 14px;
      background:
        linear-gradient(180deg, color-mix(in oklab, var(--glass-highlight) 28%, transparent), transparent 42%),
        color-mix(in srgb, var(--panel-strong) 90%, transparent);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      box-shadow: inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 54%, transparent);
    }

    .header-top {
      display: grid;
      grid-template-columns: 1fr minmax(0, auto) 1fr;
      align-items: center;
      gap: 12px;
    }

    .header-spacer {
      min-width: 0;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-title-select {
      min-width: min(58vw, 560px);
      max-width: min(58vw, 560px);
      border: 1px solid var(--glass-edge-soft);
      border-radius: 999px;
      background:
        linear-gradient(148deg, color-mix(in oklab, var(--glass-highlight) 34%, transparent), transparent 64%),
        color-mix(in oklab, var(--panel-soft) 80%, transparent);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .01em;
      padding: 7px 12px;
      outline: none;
      cursor: pointer;
      text-align: center;
      text-overflow: ellipsis;
    }

    .header-title-select:focus-visible {
      box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 28%, transparent);
    }

    .header-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    #reader {
      min-height: 0;
      overflow: auto;
      padding: 12px;
      background:
        linear-gradient(180deg, color-mix(in oklab, var(--glass-highlight) 18%, transparent), transparent 56%);
    }

    .selection-card {
      margin: 0 auto 10px;
      max-width: 980px;
      padding: 10px;
      border-radius: 12px;
      display: none;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      font-size: 13px;
      background:
        linear-gradient(145deg, color-mix(in oklab, var(--glass-highlight) 48%, transparent), transparent 60%),
        color-mix(in oklab, var(--panel-soft) 84%, transparent);
      border: 1px solid var(--glass-edge-soft);
      backdrop-filter: blur(16px) saturate(138%);
      -webkit-backdrop-filter: blur(16px) saturate(138%);
    }

    .selection-title { font-weight: 700; margin-bottom: 4px; }
    .selection-text { color: var(--muted); max-height: 48px; overflow: hidden; white-space: pre-wrap; }

    .playground-notice {
      margin: 0 auto 10px;
      max-width: 980px;
      padding: 12px 14px;
      border-radius: 14px;
      display: none;
      gap: 10px;
      align-items: flex-start;
      font-size: 13px;
      line-height: 1.65;
      background:
        linear-gradient(145deg, color-mix(in oklab, rgba(255, 193, 120, 0.24) 78%, transparent), transparent 58%),
        color-mix(in oklab, var(--panel-soft) 88%, transparent);
      border: 1px solid color-mix(in oklab, #ffbf78 42%, var(--glass-edge-soft));
      backdrop-filter: blur(16px) saturate(138%);
      -webkit-backdrop-filter: blur(16px) saturate(138%);
      box-shadow:
        inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 62%, transparent),
        0 10px 22px color-mix(in oklab, rgba(255, 179, 92, 0.18) 78%, transparent);
    }

    .playground-notice.visible {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
    }

    .playground-notice-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff3de;
      background: linear-gradient(145deg, #d6812f 0%, #b95f18 100%);
      border: 1px solid color-mix(in oklab, #ffd1a0 38%, transparent);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22);
    }

    .playground-notice-title {
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff2dd;
    }

    .playground-notice-copy {
      color: color-mix(in oklab, var(--text) 88%, #ffe5c4);
    }

    #reader-card {
      max-width: 980px;
      margin: 0 auto;
      border-radius: 16px;
      padding: 16px 18px;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .reader-prose h1,
    .reader-prose h2,
    .reader-prose h3 { line-height: 1.25; margin-top: 1.4em; margin-bottom: .6em; }
    .reader-prose h1 { margin-top: .2em; font-size: 2rem; }
    .reader-prose h2 { font-size: 1.5rem; }
    .reader-prose {
      min-width: 0;
      max-width: 100%;
      overflow-x: hidden;
    }
    .reader-prose p { line-height: 1.85; }
    .reader-prose .katex {
      vertical-align: baseline;
      user-select: text;
      -webkit-user-select: text;
    }
    .reader-prose .katex,
    .reader-prose .katex-display,
    .reader-prose .katex * {
      user-select: text;
      -webkit-user-select: text;
    }
    .reader-prose .katex-display {
      display: block;
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      margin: 1em 0;
    }
    .reader-prose .katex-display > .katex {
      display: inline-block;
      min-width: max-content;
      white-space: nowrap;
    }
    .reader-prose article,
    .reader-prose section,
    .reader-prose div,
    .reader-prose p,
    .reader-prose figure {
      max-width: 100%;
      box-sizing: border-box;
    }
    .reader-prose img {
      display: block;
      max-width: 100% !important;
      width: auto !important;
      height: auto !important;
    }
    .reader-prose iframe,
    .reader-prose video,
    .reader-prose canvas,
    .reader-prose svg,
    .reader-prose embed,
    .reader-prose object {
      display: block;
      max-width: 100% !important;
      width: 100% !important;
      box-sizing: border-box;
    }
    .reader-prose table {
      width: 100% !important;
      max-width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
    }
    .reader-prose th,
    .reader-prose td {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .reader-prose .notebook-attribution {
      margin: 0 0 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid color-mix(in oklab, var(--accent) 26%, var(--glass-edge-soft));
      background:
        linear-gradient(148deg, color-mix(in oklab, var(--accent) 12%, transparent), transparent 62%),
        color-mix(in oklab, var(--panel-soft) 82%, transparent);
      box-shadow: inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 48%, transparent);
    }
    .reader-prose .notebook-attribution-title {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: color-mix(in oklab, var(--accent) 70%, white);
    }
    .reader-prose .notebook-attribution p {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
    }
    .reader-prose .notebook-attribution p + p {
      margin-top: 8px;
    }
    .reader-prose .notebook-attribution a {
      color: color-mix(in oklab, var(--accent) 76%, white);
      text-decoration: underline;
      text-underline-offset: 0.16em;
    }
    .reader-prose pre {
      background: var(--code-bg);
      color: var(--code-fg);
      font-family: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.58;
      border: 1px solid var(--code-border);
      border-radius: 12px;
      padding: 12px;
      overflow: visible;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
    }

    .notebook-completion-panel {
      margin-top: 16px;
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid var(--glass-edge-soft);
      background:
        linear-gradient(145deg, color-mix(in oklab, var(--glass-highlight) 42%, transparent), transparent 60%),
        color-mix(in oklab, var(--panel-soft) 86%, transparent);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .notebook-completion-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .01em;
      color: var(--text);
      user-select: none;
      cursor: pointer;
    }

    .notebook-completion-checkbox {
      width: 16px;
      height: 16px;
      accent-color: color-mix(in oklab, var(--accent) 72%, white);
      cursor: pointer;
      margin: 0;
      flex: 0 0 auto;
    }

    .home-stage {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }

    .home-hero-shell {
      border-radius: 18px;
      padding: 16px;
      border: 1px solid var(--glass-edge-soft);
      background:
        radial-gradient(circle at 8% 10%, color-mix(in oklab, var(--glass-highlight) 68%, transparent), transparent 34%),
        radial-gradient(circle at 86% 12%, color-mix(in oklab, var(--accent) 26%, transparent), transparent 38%),
        linear-gradient(150deg, color-mix(in oklab, var(--panel-soft) 82%, transparent), color-mix(in oklab, var(--panel-strong) 64%, transparent));
      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);
      box-shadow: inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 62%, transparent);
    }

    .home-hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .home-kicker {
      margin: 0 0 6px;
      font-size: 11px;
      color: color-mix(in oklab, var(--muted) 86%, white);
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .home-title {
      margin: 0 0 8px;
      font-family: var(--brand-font);
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .home-lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.78;
      font-size: 14px;
      max-width: 64ch;
    }

    .home-orbit {
      position: relative;
      width: 92px;
      height: 92px;
      flex: 0 0 92px;
      border-radius: 999px;
      border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--glass-edge-soft));
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.24), transparent 58%),
        color-mix(in oklab, var(--panel-soft) 88%, transparent);
      box-shadow: inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 70%, transparent);
    }

    .home-orbit span {
      position: absolute;
      border-radius: 999px;
      border: 1px dashed color-mix(in oklab, var(--glass-edge-soft) 82%, transparent);
      inset: 10px;
      animation: orbit-spin 11s linear infinite;
    }

    .home-orbit span:nth-child(2) {
      inset: 22px;
      animation-duration: 8s;
      animation-direction: reverse;
    }

    .home-orbit span:nth-child(3) {
      inset: 34px;
      animation-duration: 6s;
    }

    @keyframes orbit-spin {
      to { transform: rotate(360deg); }
    }

    .home-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .home-metric {
      border-radius: 12px;
      border: 1px solid var(--glass-edge-soft);
      padding: 10px 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      column-gap: 10px;
      background:
        linear-gradient(148deg, color-mix(in oklab, var(--glass-highlight) 46%, transparent), transparent 62%),
        color-mix(in oklab, var(--panel-soft) 86%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .home-metric-label {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .03em;
      text-transform: uppercase;
      min-width: 0;
    }

    .home-metric-value {
      display: inline-flex;
      justify-self: end;
      text-align: right;
      font-size: clamp(28px, 2.35vw, 38px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: .005em;
      color: color-mix(in oklab, var(--text) 88%, white);
      text-shadow: 0 8px 18px color-mix(in oklab, var(--accent) 28%, transparent);
    }

    .home-metric-value-status {
      font-size: clamp(13px, 1.05vw, 16px);
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: .015em;
      text-shadow: none;
      max-width: 14ch;
      white-space: normal;
      text-wrap: balance;
    }

    .home-cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .home-cta,
    .home-cta-ghost {
      min-width: 170px;
    }

    .home-recent-continue {
      width: 100%;
      margin-top: 4px;
    }

    .home-dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .home-progress-card,
    .home-section-progress-card,
    .home-insight-card {
      border-radius: 14px;
      padding: 12px;
      font-size: 13px;
      background:
        linear-gradient(150deg, color-mix(in oklab, var(--glass-highlight) 56%, transparent), transparent 58%),
        color-mix(in oklab, var(--panel-soft) 84%, transparent);
      border: 1px solid var(--glass-edge-soft);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: grid;
      gap: 8px;
    }

    .home-progress-card {
      grid-template-columns: 120px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
    }

    .home-progress-ring {
      --progress: 0;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, color-mix(in oklab, var(--glass-highlight) 52%, transparent), transparent 58%),
        conic-gradient(
          color-mix(in oklab, var(--accent) 58%, white) calc(var(--progress) * 1%),
          color-mix(in oklab, var(--panel-strong) 68%, transparent) 0
        );
      display: grid;
      place-items: center;
      border: 1px solid color-mix(in oklab, var(--accent) 34%, var(--glass-edge-soft));
      box-shadow:
        inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 72%, transparent),
        0 12px 22px color-mix(in oklab, var(--accent) 24%, transparent);
      position: relative;
    }

    .home-progress-ring::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: color-mix(in oklab, var(--panel-soft) 92%, transparent);
      border: 1px solid color-mix(in oklab, var(--glass-edge-soft) 92%, transparent);
    }

    .home-progress-ring span {
      position: relative;
      z-index: 1;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: .01em;
      text-shadow: 0 7px 14px color-mix(in oklab, var(--accent) 22%, transparent);
    }

    .home-progress-meta strong {
      display: block;
      font-size: 16px;
      letter-spacing: .01em;
      margin-bottom: 2px;
    }

    .home-progress-meta p {
      margin: 0;
      color: var(--muted);
      line-height: 1.68;
    }

    .home-section-progress-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    .home-section-progress-title strong {
      font-size: 14px;
      font-weight: 700;
    }

    .home-section-progress-title span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .home-section-progress-list {
      display: grid;
      gap: 8px;
      max-height: min(37vh, 280px);
      overflow: auto;
      padding-right: 2px;
    }

    .home-section-progress-item {
      display: grid;
      gap: 6px;
    }

    .home-section-progress-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: baseline;
      gap: 10px;
      font-size: 12px;
    }

    .home-section-progress-head strong {
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: .01em;
    }

    .home-section-progress-head span {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 11px;
    }

    .home-section-progress-track {
      height: 9px;
      border-radius: 999px;
      background: color-mix(in oklab, var(--panel-strong) 72%, transparent);
      border: 1px solid color-mix(in oklab, var(--glass-edge-soft) 76%, transparent);
      overflow: hidden;
    }

    .home-section-progress-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, color-mix(in oklab, var(--accent) 62%, white), color-mix(in oklab, var(--accent) 45%, transparent));
      box-shadow: inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 66%, transparent);
    }

    .home-insight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .home-progress-groups {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .home-progress-group {
      border-radius: 16px;
      padding: 12px;
      border: 1px solid var(--glass-edge-soft);
      background:
        linear-gradient(150deg, color-mix(in oklab, var(--glass-highlight) 46%, transparent), transparent 58%),
        color-mix(in oklab, var(--panel-soft) 86%, transparent);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: grid;
      gap: 10px;
    }

    .home-progress-group-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 12px;
    }

    .home-progress-group-header strong {
      display: block;
      font-size: 16px;
      line-height: 1.35;
      letter-spacing: .01em;
    }

    .home-progress-group-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .home-progress-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--glass-edge-soft));
      background: color-mix(in oklab, var(--accent) 12%, transparent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .03em;
      color: color-mix(in oklab, var(--accent) 74%, white);
    }

    .home-progress-bar {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid color-mix(in oklab, var(--glass-edge-soft) 84%, transparent);
      background: color-mix(in oklab, var(--panel-strong) 72%, transparent);
    }

    .home-progress-bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, color-mix(in oklab, var(--accent) 68%, white), color-mix(in oklab, var(--accent-strong) 74%, black));
      box-shadow: inset 0 1px 0 color-mix(in oklab, var(--glass-highlight) 66%, transparent);
    }

    .home-progress-group-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .home-progress-stat {
      border-radius: 12px;
      border: 1px solid color-mix(in oklab, var(--glass-edge-soft) 84%, transparent);
      padding: 8px 10px;
      background: color-mix(in oklab, var(--panel-soft) 78%, transparent);
      display: grid;
      gap: 4px;
    }

    .home-progress-stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .home-progress-stat-value {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.15;
      color: color-mix(in oklab, var(--text) 90%, white);
    }

    .home-progress-chapters {
      display: grid;
      gap: 8px;
    }

    .home-progress-chapter {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px 12px;
      align-items: center;
    }

    .home-progress-chapter strong {
      font-size: 12px;
      line-height: 1.45;
      min-width: 0;
    }

    .home-progress-chapter span {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .home-progress-chapter-bar {
      grid-column: 1 / -1;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid color-mix(in oklab, var(--glass-edge-soft) 78%, transparent);
      background: color-mix(in oklab, var(--panel-strong) 68%, transparent);
    }

    .home-progress-chapter-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, color-mix(in oklab, var(--accent) 58%, white), color-mix(in oklab, var(--accent-strong) 62%, black));
    }

    .home-insight-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .home-insight-title {
      font-size: 15px;
      line-height: 1.45;
      letter-spacing: .01em;
    }

    .home-insight-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .home-recent-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
      max-height: min(24vh, 190px);
      overflow: auto;
    }

    .home-recent-item {
      margin: 0;
    }

    .home-recent-link {
      width: 100%;
      border: 1px solid color-mix(in oklab, var(--glass-edge-soft) 84%, transparent);
      border-radius: 10px;
      padding: 8px 10px;
      background:
        linear-gradient(140deg, color-mix(in oklab, var(--glass-highlight) 38%, transparent), transparent 62%),
        color-mix(in oklab, var(--panel-soft) 85%, transparent);
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, background .18s ease;
      display: grid;
      gap: 2px;
    }

    .home-recent-link:hover {
      border-color: color-mix(in oklab, var(--accent) 40%, var(--glass-edge-soft));
      transform: translateY(-1px);
      background:
        linear-gradient(140deg, color-mix(in oklab, var(--accent) 18%, transparent), transparent 62%),
        color-mix(in oklab, var(--panel-soft) 88%, transparent);
    }

    .home-recent-main {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .home-recent-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
    }

    .code-runner {
      margin: 1em 0;
      border: 1px solid var(--glass-edge-soft);
      border-radius: 12px;
      overflow: hidden;
      background: var(--code-bg);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .code-runner-shell {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      align-items: stretch;
      background: var(--code-bg);
    }

    .code-runner-rail {
      border-right: 0;
      background:
        radial-gradient(
          circle at 50% 22px,
          color-mix(in oklab, var(--panel-strong) 40%, transparent) 0 18px,
          transparent 20px
        );
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 8px;
    }

    .code-runner pre {
      margin: 0;
      border-radius: 0;
      border: 0;
      background: var(--code-bg);
      color: var(--code-fg);
      font-family: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.58;
      overflow: visible;
    }

    .code-editor-surface {
      position: relative;
      min-width: 0;
      display: grid;
      align-items: start;
      isolation: isolate;
      background: var(--code-bg);
      overflow: hidden;
    }

    .code-editor-surface pre {
      pointer-events: auto;
      position: relative;
      z-index: 1;
      opacity: 1 !important;
      visibility: visible !important;
    }

    .code-editor-surface pre,
    .code-editor-surface .code-editor {
      grid-area: 1 / 1;
      min-width: 0;
    }

    .code-editor {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      min-height: 100%;
      border: 0;
      border-radius: 0;
      margin: 0;
      padding: 12px;
      font-family: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.58;
      resize: none;
      color: transparent;
      caret-color: var(--code-fg);
      background: transparent !important;
      outline: none;
      tab-size: 2;
      white-space: pre-wrap;
      overflow: hidden;
      overflow-wrap: break-word;
      z-index: 3;
      pointer-events: auto;
      -webkit-appearance: none;
      appearance: none;
      box-shadow: none;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }

    .code-runner pre code,
    #notebook-content .hljs {

      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: normal;
    }

      overflow-x: visible !important;

    .run-code {
      width: 28px;
      height: 28px;
      border: 1px solid color-mix(in oklab, var(--accent) 28%, var(--border));
      background:
        linear-gradient(148deg, color-mix(in oklab, var(--glass-highlight) 42%, transparent), transparent 64%),
        color-mix(in oklab, var(--panel-soft) 84%, transparent);
      color: var(--text);
      border-radius: 999px;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .run-code:hover {
      background: color-mix(in oklab, var(--panel-strong) 94%, transparent);
      border-color: color-mix(in oklab, var(--accent) 48%, var(--border));
    }

    .run-code:disabled {
      cursor: wait;
      opacity: .85;
    }

    .run-code .run-icon {
      width: 12px;
      height: 12px;
      display: block;
      fill: currentColor;
      transform: translateX(1px);
    }

    .run-code .run-done-icon,
    .run-code .run-fail-icon {
      width: 12px;
      height: 12px;
      display: none;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .run-code.is-running .run-icon {
      display: none;
    }

    .run-code .run-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid color-mix(in oklab, var(--accent) 35%, transparent);
      border-top-color: currentColor;
      border-radius: 999px;
      display: none;
      animation: spin .8s linear infinite;
    }

    .run-code.is-running .run-spinner {
      display: block;
    }

    .run-code.is-done {
      color: color-mix(in oklab, #7fe0a9 82%, var(--text));
      border-color: color-mix(in oklab, #7fe0a9 52%, var(--border));
      background:
        linear-gradient(148deg, color-mix(in oklab, #7fe0a9 22%, transparent), transparent 64%),
        color-mix(in oklab, var(--panel-soft) 90%, transparent);
    }

    .run-code.is-done .run-icon {
      display: none;
    }

    .run-code.is-done .run-done-icon {
      display: block;
      transform: translateY(-.2px);
    }

    .run-code.is-failed {
      color: color-mix(in oklab, #ff9ea8 82%, var(--text));
      border-color: color-mix(in oklab, #ff9ea8 56%, var(--border));
      background:
        linear-gradient(148deg, color-mix(in oklab, #ff9ea8 20%, transparent), transparent 64%),
        color-mix(in oklab, var(--panel-soft) 90%, transparent);
    }

    .run-code.is-failed .run-icon {
      display: none;
    }

    .run-code.is-failed .run-fail-icon {
      display: block;
    }

      to { transform: rotate(360deg); }

      function hasKatexCssApplied() {
        const probe = document.createElement("span");
        probe.className = "katex";
        probe.style.position = "absolute";

        probe.style.pointerEvents = "none";
        probe.innerHTML = '<span class="katex-mathml">x</span><span class="katex-html" aria-hidden="true">x</span>';
        document.body.appendChild(probe);
        const mathml = probe.querySelector(".katex-mathml");
        const style = mathml ? window.getComputedStyle(mathml) : null;
        const width = parseFloat(String(style.width || "999"));
        const height = parseFloat(String(style.height || "999"));
        const hiddenByKatex = style.position === "absolute" && style.overflow === "hidden" && width <= 2 && height <= 2;
        probe.remove();

      async function ensureKatexStyles() {
        if (hasKatexCssApplied()) return;
        if (!katexCssEnsurePromise) {
          katexCssEnsurePromise = fetch(`${KATEX_CSS_HREF}?v=20260218`, { cache: "no-store" })
            .then(async (response) => {
              if (!response.ok) return;
              const css = await response.text();
              if (!css.trim()) return;
              let styleTag = document.getElementById("katex-inline-fallback");
              if (!styleTag) {
                styleTag = document.createElement("style");
                styleTag.id = "katex-inline-fallback";

              }
              styleTag.textContent = css;

            .catch(() => undefined)

      function isKatexRenderingBroken(container) {
        const renderedMathml = container.querySelector(".katex .katex-mathml");

        const width = parseFloat(String(style.width || "999"));

        const hiddenByKatex = style.position === "absolute" && style.overflow === "hidden" && width <= 2 && height <= 2;

      function replaceKatexWithTex(container) {
        let replaced = 0;
        container.querySelectorAll(".katex").forEach((node) => {
          const annotation = node.querySelector(".katex-mathml annotation[encoding='application/x-tex']");
          const tex = annotation && annotation.textContent ? annotation.textContent.trim() : "";
          if (!tex) return;
          const displayWrapper =
            node.parentElement && node.parentElement.classList.contains("katex-display") ? node.parentElement : null;
          const texNode = document.createTextNode(displayWrapper ? `\n$$\n${tex}\n$$\n` : `$${tex}$`);
          (displayWrapper || node).replaceWith(texNode);
          replaced += 1;
        });
        return replaced > 0;
      }

      function stabilizeInlineMath(container) {

      function serializeMathForClipboard(fragmentRoot) {
        fragmentRoot.querySelectorAll(".katex-display").forEach((node) => {
          const annotation = node.querySelector(".katex-mathml annotation[encoding='application/x-tex']");
          const tex = annotation && annotation.textContent ? annotation.textContent.trim() : "";
          node.replaceWith(document.createTextNode(tex ? `$$${tex}$$` : node.textContent || ""));
        });

        fragmentRoot.querySelectorAll(".katex").forEach((node) => {
          const annotation = node.querySelector(".katex-mathml annotation[encoding='application/x-tex']");
          const tex = annotation && annotation.textContent ? annotation.textContent.trim() : "";
          node.replaceWith(document.createTextNode(tex || node.textContent || ""));
        });

        return (fragmentRoot.textContent || "").replace(/\u2060/g, "");

      function handleNotebookCopy(event) {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return;
        const range = selection.getRangeAt(0);
        if (!el.notebookContent.contains(range.commonAncestorContainer)) return;
        const fragment = range.cloneContents();
        const wrapper = document.createElement("div");
        wrapper.appendChild(fragment);
        if (!wrapper.querySelector(".katex")) return;
        const text = serializeMathForClipboard(wrapper);
        if (!text) return;
        event.preventDefault();
        event.clipboardData.setData("text/plain", text);

      async function ensureMathJax() {
        if (window.MathJax && typeof window.MathJax.typesetPromise === "function") {
          return window.MathJax;

        if (!mathJaxPromise) {
          window.MathJax = window.MathJax || {
            tex: {
              inlineMath: [["$", "$"], ["\\(", "\\)"]],
              displayMath: [["$$", "$$"], ["\\[", "\\]"]]
            },
            options: {
              skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
            },

            }
          };

          mathJaxPromise = new Promise((resolve, reject) => {
            const script = document.createElement("script");

            script.async = true;
            script.onload = () => resolve(window.MathJax);
            script.onerror = () => reject(new Error("MathJax load failed"));

        return mathJaxPromise;

      function parseJwt(token) {
        try {
          const payload = token.split(".")[1];
          return JSON.parse(atob(payload.replace(/-/g, "+").replace(/_/g, "/")));
        } catch {
          return null;
        }
      }

      function getToken() {
        const token = localStorage.getItem(TOKEN_KEY) || "";
        if (!token) return "";
        const payload = parseJwt(token);
        if (!payload) return "";
        if (payload.exp && Date.now() >= payload.exp * 1000) {
          localStorage.removeItem(TOKEN_KEY);
          return "";
        }
        return token;
      }

      function resolveUserScopeKey(token) {
        const payload = parseJwt(token);
        if (!payload || typeof payload !== "object") return "";
        const raw =
          (typeof payload.sub === "string" && payload.sub.trim()) ||
          (typeof payload.email === "string" && payload.email.trim()) ||
          "";
        return raw ? raw.toLowerCase() : "";
      }

        const ms = Date.parse(String(isoString || ""));
        if (!Number.isNaN(ms)) return ms;

      function detectApiKeyProvider(text) {
        const value = String(text || "").trim();
        if (!value) return "";
        if (/^sk-[A-Za-z0-9_-]{20,}$/.test(value)) return "openai";
        if (/^AIza[0-9A-Za-z_-]{20,}$/.test(value)) return "gemini";

          openaiApiKey: provider === "openai" ? "" : state.llmSettings.openaiApiKey,

      function assistantApiKeyHelpText() {
        return [
          "APIキー未設定です。",
          "このチャットに APIキーだけ を送ると保存します。",
          "OpenAI は `sk-...`、Gemini は `AIza...` をそのまま送ってください。",
          "変更: `/openai-key 新しいキー` または `/gemini-key 新しいキー`",
          "削除: `/apikey clear openai` または `/apikey clear gemini`",
          "ヘルプ: `/apikey help`"
        ].join("\n");
      }

      function handleAssistantApiKeyCommand(rawText, target) {
        const text = String(rawText || "").trim();
        if (!text) {
          return { handled: false };
        }

        if (text === "/apikey help") {
          return {
            handled: true,
            role: "system",
            message: assistantApiKeyHelpText()
          };
        }

        const clearMatch = text.match(/^\/apikey\s+clear\s+(openai|gemini)$/i);
        if (clearMatch) {
          const provider = clearMatch[1].toLowerCase();
          clearAssistantApiKey(provider);
          return {
            handled: true,
            role: "system",
            message: `${provider === "openai" ? "OpenAI" : "Gemini"} APIキーを削除しました。`
          };
        }

        const explicitMatch = text.match(/^\/(openai-key|gemini-key)\s+(.+)$/i);
        if (explicitMatch) {
          const provider = explicitMatch[1].toLowerCase().startsWith("openai") ? "openai" : "gemini";
          const apiKey = explicitMatch[2].trim();
          if (!detectApiKeyProvider(apiKey)) {
            return {
              handled: true,
              role: "system",
              message: "APIキーの形式を確認してください。`/apikey help` で使い方を表示できます。"
            };
          }
          storeAssistantApiKey(provider, apiKey);
          return {
            handled: true,
            role: "system",
            message: `${provider === "openai" ? "OpenAI" : "Gemini"} APIキーを保存しました。`
          };
        }

        const detectedProvider = detectApiKeyProvider(text);
        if (detectedProvider) {
          storeAssistantApiKey(detectedProvider, text);
          return {
            handled: true,
            role: "system",
            message: `${detectedProvider === "openai" ? "OpenAI" : "Gemini"} APIキーを保存しました。必要ならモデル選択を切り替えて続けて質問してください。変更方法: /apikey help`
          };
        }

        if ((target.provider === "openai" && !state.llmSettings.openaiApiKey) || (target.provider === "gemini" && !state.llmSettings.geminiApiKey)) {
          return {
            handled: true,
            role: "system",
            message: assistantApiKeyHelpText()
          };
        }

        return { handled: false };
      }
