      function extractImportedModulesFromSource(source) {
        const modules = new Set();
        const normalized = normalizeRunnableSource(source || "");
        const lines = normalized.split(/\r?\n/);

        lines.forEach((line) => {
          const trimmed = line.replace(/#.*/, "").trim();
          if (!trimmed) return;

          const importMatch = trimmed.match(/^import\s+(.+)$/);
          if (importMatch && importMatch[1]) {
            importMatch[1]
              .split(",")
              .map((part) => part.trim())
              .forEach((part) => {
                if (!part) return;
                const moduleName = part.split(/\s+as\s+/i)[0].trim().split(".")[0];
                if (moduleName) modules.add(moduleName);
              });
            return;
          }

          const fromMatch = trimmed.match(/^from\s+([A-Za-z0-9_.]+)\s+import\s+/);
          if (fromMatch && fromMatch[1]) {
            const moduleName = fromMatch[1].split(".")[0];
            if (moduleName) modules.add(moduleName);
          }
        });

        return Array.from(modules);
      }

      function collectNotebookImportedModules(container) {
        const modules = new Set();
        container.querySelectorAll("pre > code").forEach((code) => {
          extractImportedModulesFromSource(code.textContent || "").forEach((moduleName) => {
            modules.add(moduleName);
          });
        });
        return Array.from(modules);
      }

      function normalizeModuleHints(moduleNames) {
        const hints = new Set();
        moduleNames.forEach((moduleName) => {
          const normalized = (moduleName || "").split(".")[0].trim();
          if (!/^[A-Za-z_][A-Za-z0-9_]*$/.test(normalized)) return;
          hints.add(normalized);
        });
        return Array.from(hints).slice(0, 24);
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function preloadNotebookPackages(container, notebookId) {
        if (!state.loggedIn) return;
        const token = getToken();
        if (!token) return;

        const modules = normalizeModuleHints(collectNotebookImportedModules(container));
        const preloadKey = `${notebookId}:${modules.join(",")}`;
        if (preloadedNotebookPackages.has(preloadKey)) return;

        preloadedNotebookPackages.add(preloadKey);
        try {
          await fetch(`${API_BASE}/api/runtime/python/preload`, {
            method: "POST",
            headers: {
              "content-type": "application/json",
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({
              notebookId,
              expectedModules: modules
            })
          });
        } catch (error) {
          preloadedNotebookPackages.delete(preloadKey);
          console.warn("Runtime preload failed", notebookId, error);
        }
      }

      async function runPythonOnServer(source, contextSource, notebookId, sectionId, expectedModules) {
        const token = getToken();
        if (!token) {
          throw new Error("コード実行にはログインが必要です。");
        }

        const body = JSON.stringify({
          notebookId,
          sectionId,
          code: source,
          contextCode: typeof contextSource === "string" ? contextSource : "",
          expectedModules: normalizeModuleHints(expectedModules)
        });

        const maxAttempts = 4;
        let lastError = null;

        for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
          let response = null;
          let payload = {};
          try {
            response = await fetch(`${API_BASE}/api/runtime/python`, {
              method: "POST",
              headers: {
                "content-type": "application/json",
                Authorization: `Bearer ${token}`
              },
              body
            });
          } catch (error) {
            lastError = error instanceof Error ? error : new Error(String(error));
            throw lastError;
          }

          try {
            payload = await response.json();
          } catch {
            payload = {};
          }

          if (!response.ok) {
            const errorText =
              payload && typeof payload.error === "string"
                ? payload.error
                : `Python実行APIエラー (status ${response.status})`;
            lastError = new Error(errorText);
            throw lastError;
          }

          const runtimeRetryable = payload && payload.retryable === true;
          const runtimeErrorCode = payload && typeof payload.errorCode === "string" ? payload.errorCode : "";
          if (runtimeRetryable && runtimeErrorCode === "DEPENDENCY_INSTALLING" && attempt < maxAttempts) {
            await sleep(1000 * attempt);
            continue;
          }

          return payload;
        }

        throw lastError || new Error("Python実行に失敗しました。");
      }

      function normalizeRenderedOutputText(text) {
        if (typeof text !== "string") return "";
        return text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").replace(/\s+$/, "");
      }

      function ensureOutputLabel(output) {
        if (!output) return;
        const current = output.querySelector(".code-output-label");
        if (current) return;
        const label = document.createElement("p");
        label.className = "code-output-label";
        const cellNumber = Number(output.dataset.cellIndex);
        label.textContent = Number.isFinite(cellNumber) && cellNumber >= 0 ? `Output | Cell ${cellNumber + 1}` : "Output";
        output.appendChild(label);
      }

      function appendOutputText(output, text, className = "") {
        const normalizedText = normalizeRenderedOutputText(text);
        if (!normalizedText) return;
        ensureOutputLabel(output);
        const pre = document.createElement("pre");
        pre.className = className ? `code-output-text ${className}` : "code-output-text";
        pre.textContent = normalizedText;
        output.appendChild(pre);
      }

      function appendOutputHtml(output, html, index) {
        if (!html) return;
        ensureOutputLabel(output);
        const frame = document.createElement("iframe");
        frame.className = "code-output-html";
        frame.setAttribute("sandbox", "allow-same-origin");
        frame.setAttribute("loading", "lazy");
        frame.setAttribute("referrerpolicy", "no-referrer");
        frame.setAttribute("aria-label", `HTML output ${index + 1}`);
        frame.srcdoc =
          "<!doctype html><html><head><meta charset='utf-8'><style>" +
          "html,body{margin:0;padding:0;background:transparent;color:#dbe4f5;font:12px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}" +
          "table{border-collapse:collapse;font-size:12px;}" +
          "th,td{border:1px solid rgba(138,159,194,.36);padding:4px 6px;text-align:left;}" +
          "th{background:rgba(122,151,201,.16);font-weight:600;}" +
          "code,pre{font-family:'JetBrains Mono','SF Mono','Menlo','Consolas',monospace;}" +
          "pre{white-space:pre-wrap;overflow-wrap:anywhere;}" +
          "</style></head><body>" +
          html +
          "</body></html>";

        frame.addEventListener("load", () => {
          try {
            const frameDocument = frame.contentDocument;
            if (!frameDocument || !frameDocument.body) return;
            const bodyHeight = frameDocument.body.scrollHeight;
            frame.style.height = `${Math.min(Math.max(bodyHeight + 2, 56), 520)}px`;
          } catch {}
        });

        output.appendChild(frame);
      }

      function appendOutputImage(output, base64Data, alt) {
        if (!base64Data) return;
        ensureOutputLabel(output);
        const image = document.createElement("img");
        image.className = "code-output-image";
        image.loading = "lazy";
        image.decoding = "async";
        image.alt = alt || "python output image";
        image.src = `data:image/png;base64,${base64Data}`;
        output.appendChild(image);
      }

      function renderPythonRunOutput(output, payload) {
        output.replaceChildren();

        const stdout = payload && typeof payload.stdout === "string" ? normalizeRenderedOutputText(payload.stdout) : "";
        const stderr = payload && typeof payload.stderr === "string" ? normalizeRenderedOutputText(payload.stderr) : "";
        const errorText = payload && typeof payload.error === "string" ? normalizeRenderedOutputText(payload.error) : "";
        const durationMs = payload && Number.isFinite(Number(payload.durationMs)) ? Number(payload.durationMs) : 0;
        const installedPackages = Array.isArray(payload?.installedPackages)
          ? payload.installedPackages.map((pkg) => String(pkg).trim()).filter(Boolean)
          : [];
        const outputs = Array.isArray(payload?.outputs) ? payload.outputs : [];

        let hasOutput = false;
        outputs.forEach((item, index) => {
          if (!item || typeof item !== "object") return;
          const type = typeof item.type === "string" ? item.type : "";
          if (type === "text/plain") {
            const text = typeof item.text === "string" ? normalizeRenderedOutputText(item.text) : "";
            if (!text) return;
            appendOutputText(output, text);
            hasOutput = true;
            return;
          }
          if (type === "text/html") {
            const html = typeof item.html === "string" ? item.html : "";
            if (!html.trim()) return;
            appendOutputHtml(output, html, index);
            hasOutput = true;
            return;
          }
          if (type === "image/png") {
            const data = typeof item.data === "string" ? item.data.replace(/\s+/g, "") : "";
            if (!data) return;
            const alt = typeof item.alt === "string" ? item.alt : "";
            appendOutputImage(output, data, alt);
            hasOutput = true;
          }
        });

        if (stdout) {
          appendOutputText(output, stdout);
          hasOutput = true;
        }
        if (stderr) {
          appendOutputText(output, stderr, "code-output-stderr");
          hasOutput = true;
        }
        if (errorText) {
          appendOutputText(output, `Error: ${errorText}`, "code-output-error");
          hasOutput = true;
        }

        const metaParts = [];
        if (durationMs > 0) {
          metaParts.push(`実行時間 ${durationMs}ms`);
        }
        if (installedPackages.length) {
          metaParts.push(`追加インストール: ${installedPackages.join(", ")}`);
        }
        if (metaParts.length) {
          appendOutputText(output, metaParts.join("  |  "), "code-output-meta");
          hasOutput = true;
        }

        if (!hasOutput) {
          appendOutputText(output, "(no output)");
        }
      }

      function ensureHighlightLibrary() {
        if (window.hljs) return Promise.resolve(window.hljs);
        if (!highlightPromise) {
          highlightPromise = new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = "/highlight/highlight.min.js";
            script.async = true;
            script.onload = () => resolve(window.hljs);
            script.onerror = () => reject(new Error("Highlight.js load failed"));
            document.head.appendChild(script);
          });
        }
        return highlightPromise;
      }

      async function applySyntaxHighlight(container) {
        const blocks = container.querySelectorAll("pre > code");
        if (!blocks.length) return;
        try {
          const hljs = await ensureHighlightLibrary();
          if (!hljs) return;
          blocks.forEach((block) => {
            if (!block.className.includes("language-")) {
              block.classList.add("language-python");
            }
            if (block.dataset && block.dataset.highlighted) {
              delete block.dataset.highlighted;
            }
            block.classList.remove("hljs");
            hljs.highlightElement(block);
          });
        } catch {}
      }

      async function applySyntaxHighlightToBlock(block) {
        try {
          const hljs = await ensureHighlightLibrary();
          if (!hljs) return;
          if (!block.className.includes("language-")) {
            block.classList.add("language-python");
          }
          if (block.dataset && block.dataset.highlighted) {
            delete block.dataset.highlighted;
          }
          block.classList.remove("hljs");
          hljs.highlightElement(block);
        } catch {}
      }

      function queueHighlightForBlock(block) {
        if (!block) return;
        const currentTimer = blockHighlightTimers.get(block);
        if (currentTimer) {
          clearTimeout(currentTimer);
        }
        const nextTimer = setTimeout(() => {
          blockHighlightTimers.delete(block);
          void applySyntaxHighlightToBlock(block);
        }, 90);
        blockHighlightTimers.set(block, nextTimer);
      }

      function autosizeCodeEditor(editor) {
        if (!editor) return;
        editor.style.height = "0px";
        editor.style.height = `${Math.max(editor.scrollHeight, 80)}px`;
      }

      function normalizeRunnableSource(rawSource) {
        if (!rawSource) return "";
        // nbconvertの出力によっては改行が "\n" の2文字で入るため、実行前に正規化する。
        if (!rawSource.includes("\n") && /\\[nrt]/.test(rawSource)) {
          return rawSource
            .replace(/\\r/g, "\r")
            .replace(/\\n/g, "\n")
            .replace(/\\t/g, "\t");
        }
        return rawSource;
      }

      function textToSourceLines(text) {
        if (!text) return [];
        const lines = String(text).split("\n");
        return lines.map((line, index) => (index < lines.length - 1 ? `${line}\n` : line));
      }

      function applyEditedSourcesToIpynb(ipynb, editedSources) {
        const notebook = ipynb && typeof ipynb === "object" ? ipynb : null;
        const cells = notebook && Array.isArray(notebook.cells) ? notebook.cells : null;
        if (!cells) {
          throw new Error("Invalid ipynb format");
        }

        let codeCellIndex = 0;
        cells.forEach((cell) => {
          if (!cell || typeof cell !== "object" || cell.cell_type !== "code") return;
          const nextSource = editedSources[codeCellIndex];
          if (nextSource !== undefined) {
            const normalized = normalizeRunnableSource(String(nextSource));
            if (Array.isArray(cell.source)) {
              cell.source = textToSourceLines(normalized);
            } else {
              cell.source = normalized;
            }
          }
          codeCellIndex += 1;
        });
      }

      function openInNewTab(url) {
        window.open(url, "_blank", "noopener,noreferrer");
      }

      async function fetchNotebookDownload(notebookId) {
        let response = await fetch(buildNotebookDownloadUrl(notebookId), { cache: "no-cache" }).catch(() => null);
        if (!response || !response.ok) {
          response = await fetch(buildNotebookDownloadUrl(notebookId, API_BASE), { cache: "no-cache" }).catch(() => null);
        }
        return response;
      }

      function triggerIpynbDownload(notebookId, ipynbRaw) {
        const blob = new Blob([ipynbRaw], { type: "application/x-ipynb+json;charset=utf-8" });
        const objectUrl = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = objectUrl;
        anchor.download = `${notebookId}.ipynb`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        setTimeout(() => URL.revokeObjectURL(objectUrl), 0);
      }

      async function downloadPlaygroundDraftNotebook() {
        if (!state.activeNotebook) return;
        const notebookId = state.activeNotebook.id;
        const response = await fetchNotebookDownload(notebookId);
        if (!response.ok) {
          throw new Error("ノートブックの取得に失敗しました。");
        }
        const ipynbRaw = await response.text();
        const notebookJson = JSON.parse(ipynbRaw);
        const editedSources = collectEditableCellSources().map((source) => normalizeRunnableSource(source));
        applyEditedSourcesToIpynb(notebookJson, editedSources);
        triggerIpynbDownload(notebookId, `${JSON.stringify(notebookJson, null, 2)}\n`);
      }

      function openPendingTab() {
        try {
          return window.open("", "_blank");
        } catch {
          return null;
        }
      }

      function setPendingTabMessage(tabRef, message) {
        if (!tabRef || tabRef.closed) return;
        try {
          const doc = tabRef.document;
          if (!doc) return;
          doc.open();
          doc.write(
            "<!doctype html><html><head><meta charset='utf-8'><title>Opening Colab...</title>" +
              "<style>body{margin:0;display:grid;place-items:center;min-height:100vh;background:#09111f;color:#dbe4f5;font:14px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}" +
              ".card{padding:20px 24px;border:1px solid rgba(138,159,194,.25);border-radius:14px;background:rgba(15,23,42,.92);box-shadow:0 12px 40px rgba(0,0,0,.28)}</style>" +
              "</head><body><div class='card'>" +
              String(message || "Colab を開いています...").replace(/[<&>]/g, function (char) {
                return char === "<" ? "&lt;" : char === ">" ? "&gt;" : "&amp;";
              }) +
              "</div></body></html>"
          );
          doc.close();
        } catch {}
      }

      function navigateTab(tabRef, url) {
        if (tabRef && !tabRef.closed && typeof tabRef.location !== "undefined") {
          try {
            tabRef.location.replace(url);
            return;
          } catch {}
        }
        openInNewTab(url);
      }

      async function openColabWithPlaygroundDraft() {
        if (!state.activeNotebook || state.colabSessionBusy) return;
        const notebookId = state.activeNotebook.id;
        const fallbackColabUrl = state.activeNotebook.colabUrl || "https://colab.research.google.com/";
        const token = getToken();
        if (!token) {
          openInNewTab(fallbackColabUrl);
          return;
        }

        const editedSources = collectEditableCellSources().map((source) => normalizeRunnableSource(source));
        if (!editedSources.length) {
          openInNewTab(fallbackColabUrl);
          return;
        }

        const pendingTab = openPendingTab();
        setPendingTabMessage(pendingTab, "Colab を開く準備中...");
        state.colabSessionBusy = true;
        const originalLabel = el.colabBtn.textContent || "Colabで実行";
        el.colabBtn.textContent = "Colab 準備中...";
        el.colabBtn.setAttribute("aria-disabled", "true");

        try {
          const ipynbResponse = await fetchNotebookDownload(notebookId);
          if (!ipynbResponse.ok) {
            throw new Error("ノートブックの取得に失敗しました。");
          }
          const ipynbRaw = await ipynbResponse.text();
          const notebookJson = JSON.parse(ipynbRaw);
          applyEditedSourcesToIpynb(notebookJson, editedSources);

          const sessionResponse = await fetch(
            `${API_BASE}/api/notebooks/${encodeURIComponent(notebookId)}/colab-session`,
            {
              method: "POST",
              headers: {
                "content-type": "application/json",
                Authorization: `Bearer ${token}`
              },
              body: JSON.stringify({
                ipynbRaw: `${JSON.stringify(notebookJson, null, 2)}\n`
              })
            }
          );

          let payload = {};
          try {
            payload = await sessionResponse.json();
          } catch {
            payload = {};
          }

          if (!sessionResponse.ok) {
            const message =
              payload && typeof payload.error === "string"
                ? payload.error
                : "Colab 用ノートの作成に失敗しました。";
            throw new Error(message);
          }

          const notebookUrl =
            payload && typeof payload.notebookUrl === "string" ? payload.notebookUrl.trim() : "";
          const notebookPath =
            payload && typeof payload.notebookPath === "string" ? payload.notebookPath.trim() : "";
          const resolvedNotebookUrl = /^https:\/\/[^ ]+$/i.test(notebookUrl)
            ? notebookUrl
            : notebookPath.startsWith("/")
              ? `${window.location.origin}${notebookPath}`
              : "";
          if (!resolvedNotebookUrl) {
            throw new Error("Colab 用ノートのURLが不正です。");
          }

          const colabUrl = `https://colab.research.google.com/?url=${encodeURIComponent(resolvedNotebookUrl)}`;
          navigateTab(pendingTab, colabUrl);
        } catch (error) {
          console.warn("Open Colab with playground draft failed", error);
          navigateTab(pendingTab, fallbackColabUrl);
        } finally {
          state.colabSessionBusy = false;
          el.colabBtn.textContent = originalLabel;
          el.colabBtn.removeAttribute("aria-disabled");
        }
      }

      const EXECUTION_CONTEXT_CHAR_LIMIT = 110000;

      function getCellSource(codeBlock, index) {
        const editor = state.activeEditorMap.get(index);
        if (editor) {
          return normalizeRunnableSource(editor.value || "");
        }
        return normalizeRunnableSource(codeBlock.textContent || "");
      }

      function buildExecutionContext(codeBlocks, uptoIndex) {
        const contextParts = [];
        const modules = new Set();
        const currentSource = getCellSource(codeBlocks[uptoIndex], uptoIndex);
        let totalChars = currentSource.length;

        for (let i = uptoIndex - 1; i >= 0; i -= 1) {
          const source = getCellSource(codeBlocks[i], i);
          if (!source.trim()) continue;

          const chunk = `# --- cell ${i + 1} ---\n${source.trimEnd()}\n`;
          if (totalChars + chunk.length > EXECUTION_CONTEXT_CHAR_LIMIT) {
            break;
          }

          contextParts.unshift(chunk);
          totalChars += chunk.length;
          extractImportedModulesFromSource(source).forEach((moduleName) => modules.add(moduleName));
        }
        extractImportedModulesFromSource(currentSource).forEach((moduleName) => modules.add(moduleName));

        return {
          contextSource: contextParts.join("\n"),
          source: currentSource,
          expectedModules: Array.from(modules)
        };
      }

      function enhanceCodeBlocks() {
        const blocks = Array.from(el.notebookContent.querySelectorAll("pre > code"));
        const notebookId = state.activeNotebook ? state.activeNotebook.id : "";
        const defaultSources = blocks.map((code) => normalizeRunnableSource(code.textContent || ""));
        const savedDraft = notebookId ? readNotebookPlaygroundDraft(notebookId, defaultSources) : [];
        state.activeEditorMap = new Map();
        state.baseCellSourceMap = new Map();

        blocks.forEach((code, codeIndex) => {
          const pre = code.parentElement;
          if (!pre || pre.dataset.noemaRunnable === "1") return;
          pre.dataset.noemaRunnable = "1";
          pre.dataset.noemaCellIndex = String(codeIndex);
          let clearExecutionStatus = () => {};
          const defaultSource = defaultSources[codeIndex] || normalizeRunnableSource(code.textContent || "");
          state.baseCellSourceMap.set(codeIndex, defaultSource);
          const restoredSource =
            state.playgroundEnabled && savedDraft[codeIndex] !== undefined
              ? normalizeRunnableSource(savedDraft[codeIndex])
              : defaultSource;
          code.textContent = restoredSource;

          const wrapper = document.createElement("div");
          wrapper.className = "code-runner";
          pre.parentNode.insertBefore(wrapper, pre);
          const shell = document.createElement("div");
          shell.className = "code-runner-shell";
          wrapper.appendChild(shell);

          const rail = document.createElement("div");
          rail.className = "code-runner-rail";
          shell.appendChild(rail);

          const editorSurface = document.createElement("div");
          editorSurface.className = "code-editor-surface";
          shell.appendChild(editorSurface);
          editorSurface.appendChild(pre);

          const editor = document.createElement("textarea");
          editor.className = "code-editor";
          editor.setAttribute("aria-label", `Editable code cell ${codeIndex + 1}`);
          editor.value = restoredSource;
          editor.addEventListener("input", () => {
            autosizeCodeEditor(editor);
            code.textContent = normalizeRunnableSource(editor.value || "");
            clearExecutionStatus();
            queueHighlightForBlock(code);
            schedulePlaygroundAutosave();
          });
          editor.addEventListener("keydown", (event) => {
            if (event.key !== "Tab") return;
            event.preventDefault();
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const next = `${editor.value.slice(0, start)}  ${editor.value.slice(end)}`;
            editor.value = next;
            editor.selectionStart = editor.selectionEnd = start + 2;
            autosizeCodeEditor(editor);
            code.textContent = normalizeRunnableSource(editor.value || "");
            clearExecutionStatus();
            queueHighlightForBlock(code);
            schedulePlaygroundAutosave();
          });
          autosizeCodeEditor(editor);
          state.activeEditorMap.set(codeIndex, editor);
          editorSurface.appendChild(editor);

          const button = document.createElement("button");
          button.className = "run-code";
          button.type = "button";
          button.setAttribute("aria-label", "Run code");
          button.setAttribute("title", "Run");
          button.innerHTML =
            '<svg class="run-icon" viewBox="0 0 12 12" aria-hidden="true"><path d="M3 2.2L10 6 3 9.8V2.2Z"></path></svg>' +
            '<svg class="run-done-icon" viewBox="0 0 12 12" aria-hidden="true"><path d="M2 6.2L4.7 9 10 3"></path></svg>' +
            '<svg class="run-fail-icon" viewBox="0 0 12 12" aria-hidden="true"><path d="M3 3L9 9M9 3L3 9"></path></svg>' +
            '<span class="run-spinner" aria-hidden="true"></span>';
          clearExecutionStatus = () => {
            button.classList.remove("is-done", "is-failed");
          };
          rail.appendChild(button);

          const output = document.createElement("div");
          output.className = "code-output";
          output.dataset.cellIndex = String(codeIndex);
          wrapper.appendChild(output);

          button.addEventListener("click", async () => {
            const context = buildExecutionContext(blocks, codeIndex);
            const source = context.source;
            if (!source.trim()) return;

            button.disabled = true;
            button.classList.remove("is-done", "is-failed");
            button.classList.add("is-running");
            output.classList.add("visible");
            output.replaceChildren();
            appendOutputText(output, "実行中...", "code-output-meta");

            try {
              const payload = await runPythonOnServer(
                source,
                context.contextSource,
                (state.activeNotebook && state.activeNotebook.id) || "unknown-notebook",
                state.activeSection || "intro",
                context.expectedModules
              );
              renderPythonRunOutput(output, payload);
              const runtimeFailed = Boolean(payload && typeof payload.error === "string" && payload.error.trim());
              if (runtimeFailed) {
                button.classList.add("is-failed");
              } else {
                button.classList.add("is-done");
              }
            } catch (error) {
              output.replaceChildren();
              appendOutputText(
                output,
                `Error: ${error instanceof Error ? error.message : String(error)}`,
                "code-output-error"
              );
              button.classList.add("is-failed");
            } finally {
              button.disabled = false;
              button.classList.remove("is-running");
            }
          });
        });

        applyPlaygroundModeToCurrentNotebook();
      }

      async function selectNotebook(notebookId) {
        if (state.playgroundSaveTimer) {
          clearTimeout(state.playgroundSaveTimer);
          state.playgroundSaveTimer = null;
        }
        if (state.playgroundEnabled && state.activeNotebook && state.activeEditorMap.size) {
          writeNotebookPlaygroundDraft(
            state.activeNotebook.id,
            collectEditableCellSources(),
            collectBaseCellSources()
          );
        }

        const chapters = notebookList();
        let target = null;
        let chapterId = "";

        for (const chapter of chapters) {
          const found = chapter.notebooks.find((nb) => nb.id === notebookId);
          if (found) {
            target = found;
            chapterId = chapter.id;
            break;
          }
        }

        if (!target) return false;

        const previousNotebook = state.activeNotebook;
        const previousSectionIds = Array.isArray(state.sectionIds) ? state.sectionIds.slice() : [];
        const previousActiveSection = state.activeSection;
        const previousSelectedText = state.selectedText;
        const previousSelectedSection = state.selectedSection;
        const previousSelectedContext = state.selectedContext;
        const previousOpenChapters = { ...state.openChapters };
        const previousEditorMap = new Map(state.activeEditorMap);
        const previousMessages = state.messages.slice();
        const previousChatView = state.chatView;
        const previousChatSessionId = state.chatSessionId;
        const previousChatHistorySessions = Array.isArray(state.chatHistorySessions) ? state.chatHistorySessions.slice() : [];
        const notebookChanged = !previousNotebook || previousNotebook.id !== target.id;

        if (notebookChanged) {
          state.messages = [];
          state.chatView = "messages";
          state.chatSessionId = "";
          state.chatHistorySessions = [];
        }

        state.activeNotebook = target;
        if (chapterId) {
          state.openChapters[chapterId] = true;
        }
        state.selectedText = "";
        state.selectedSection = "";
        state.selectedContext = null;
        state.sectionIds = ["intro"];

        renderSidebar();
        renderHeader();
        renderSelectionCard();
        el.notebookContent.innerHTML = "教材を読み込み中...";

        try {
          let response = await fetch(buildNotebookHtmlUrl(target), { cache: "no-cache" }).catch(() => null);
          if (!response || !response.ok) {
            response = await fetch(buildNotebookContentUrl(target.id), { cache: "no-cache" }).catch(() => null);
          }
          if (!response || !response.ok) {
            response = await fetch(buildNotebookContentUrl(target.id, API_BASE), { cache: "no-cache" }).catch(() => null);
          }
          if (!response.ok) throw new Error("教材HTMLの読み込みに失敗しました");
          const htmlText = await response.text();
          el.notebookContent.innerHTML = decorateNotebookArticle(target, htmlText);
          el.notebookContent.classList.add("reader-prose");
          await ensureKatexStyles();
          const katexBroken = isKatexRenderingBroken(el.notebookContent);
          if (katexBroken) {
            const convertedFromBrokenKatex = replaceKatexWithTex(el.notebookContent);
            if (convertedFromBrokenKatex) {
              await renderMathFallback(el.notebookContent);
            }
          } else if (!hasKatexCssApplied()) {
            const convertedFromBrokenKatex = replaceKatexWithTex(el.notebookContent);
            if (convertedFromBrokenKatex) {
              await renderMathFallback(el.notebookContent);
            }
          }
          stabilizeInlineMath(el.notebookContent);
          state.sectionIds = extractSectionIds(el.notebookContent);
          state.activeSection = state.sectionIds[0] || "intro";
          renderHeader();
          renderSections();
          void preloadNotebookPackages(el.notebookContent, target.id);
          enhanceCodeBlocks();
          await applySyntaxHighlight(el.notebookContent);
          void markNotebookVisited(target.id);
          renderNotebookCompletionControl(target.id);

          const url = new URL(window.location.href);
          url.searchParams.set("notebookId", target.id);
          window.history.replaceState(null, "", url.toString());
          return true;
        } catch (error) {
          state.activeNotebook = previousNotebook;
          state.sectionIds = previousSectionIds;
          state.activeSection = previousActiveSection;
          state.selectedText = previousSelectedText;
          state.selectedSection = previousSelectedSection;
          state.selectedContext = previousSelectedContext;
          state.openChapters = previousOpenChapters;
          state.activeEditorMap = previousEditorMap;
          state.messages = previousMessages;
          state.chatView = previousChatView;
          state.chatSessionId = previousChatSessionId;
          state.chatHistorySessions = previousChatHistorySessions;
          const msg = error instanceof Error ? error.message : "読み込みエラー";
          if (previousNotebook) {
            renderSidebar();
            renderHeader();
            renderSections();
            renderSelectionCard();
            el.notebookContent.innerHTML = `<p class=\"error-text\">${msg}</p>`;
          } else {
            showHomeDashboard();
            window.setTimeout(() => {
              window.alert(msg);
            }, 0);
          }
          return false;
        }
      }

      function captureSelection() {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) return null;

        const text = selection.toString().trim();
        if (!text) return null;

        const range = selection.getRangeAt(0);
        if (!el.notebookContent.contains(range.startContainer) || !el.notebookContent.contains(range.endContainer)) {
          return null;
        }

        const findCodeNode = (node) => {
          let current = node && node.nodeType === Node.ELEMENT_NODE ? node : node && node.parentElement;
          while (current && current !== el.notebookContent) {
            if (current.tagName === "CODE" && current.parentElement && current.parentElement.tagName === "PRE") {
              return current;
            }
            current = current.parentElement;
          }
          return null;
        };

        const startCodeNode = findCodeNode(range.startContainer);
        const endCodeNode = findCodeNode(range.endContainer);
        const isSameCodeBlock = startCodeNode && endCodeNode && startCodeNode === endCodeNode;

        let node = range.startContainer.nodeType === Node.ELEMENT_NODE ? range.startContainer : range.startContainer.parentElement;
        let sectionId = "";
        while (node && node !== el.notebookContent) {
          if (node.id) {
            sectionId = node.id;
            break;
          }
          node = node.parentElement;
        }

        if (isSameCodeBlock) {
          const pre = startCodeNode.parentElement;
          const rawIndex = pre?.dataset?.noemaCellIndex;
          const cellIndex = Number.isFinite(Number(rawIndex)) ? Number(rawIndex) : -1;
          const currentCode = cellIndex >= 0 && state.activeEditorMap.get(cellIndex)
            ? String(state.activeEditorMap.get(cellIndex).value || "")
            : String(startCodeNode.textContent || "");

          const codeText = normalizeRunnableSource(currentCode);
          const segmentRange = document.createRange();
          segmentRange.setStart(startCodeNode, 0);
          segmentRange.setEnd(range.startContainer, range.startOffset);
          const beforeTextLength = segmentRange.toString().length;
          const selectedLength = range.toString().length;
          const startOffset = Math.max(0, Math.min(beforeTextLength, codeText.length));
          const endOffset = Math.max(startOffset, Math.min(startOffset + selectedLength, codeText.length));

          const before = codeText.slice(0, startOffset);
          const selected = codeText.slice(startOffset, endOffset) || text;
          const lineStart = before.split(/\r?\n/).length;
          const lineEnd = (before + selected).split(/\r?\n/).length;
          const lines = codeText.split(/\r?\n/);
          const contextStart = Math.max(1, lineStart - 3);
          const contextEnd = Math.min(lines.length, lineEnd + 3);
          const contextSnippet = lines.slice(contextStart - 1, contextEnd).join("\n");

          return {
            text: selected || text,
            sectionId: sectionId || `code-cell-${Math.max(cellIndex, 0)}`,
            selectionType: "code",
            codeCellIndex: cellIndex,
            lineStart,
            lineEnd,
            contextSnippet
          };
        }

        return { text, sectionId, selectionType: "text" };
      }

      function buildQuestionTextWithSelection(questionText, selection) {
        if (!selection || !selection.text) return questionText;
        if (selection.selectionType !== "code") {
          return `${questionText}\n\n[Selection]\n${selection.text}`;
        }

        const notebookId = state.activeNotebook ? state.activeNotebook.id : "unknown-notebook";
        const cellLabel =
          Number.isFinite(selection.codeCellIndex) && selection.codeCellIndex >= 0
            ? String(selection.codeCellIndex + 1)
            : "unknown";
        const lineLabel =
          Number.isFinite(selection.lineStart) && Number.isFinite(selection.lineEnd)
            ? `${selection.lineStart}-${selection.lineEnd}`
            : "unknown";
        const context = String(selection.contextSnippet || "").trim();
        const contextBlock = context
          ? `\n\n[CodeContext]\n\`\`\`python\n${context}\n\`\`\``
          : "";

        return `${questionText}\n\n[SelectionType]\ncode\n[NotebookId]\n${notebookId}\n[CodeCell]\n${cellLabel}\n[SelectedLines]\n${lineLabel}\n[SelectedCode]\n\`\`\`python\n${selection.text}\n\`\`\`${contextBlock}`;
      }

      function renderSelectionCard() {
        if (!state.selectedText) {
          el.selectionCard.style.display = "none";
          el.selectionText.textContent = "";
          return;
        }

        el.selectionCard.style.display = "flex";
        if (state.selectedContext && state.selectedContext.selectionType === "code") {
          const cell =
            Number.isFinite(state.selectedContext.codeCellIndex) && state.selectedContext.codeCellIndex >= 0
              ? state.selectedContext.codeCellIndex + 1
              : "?";
          const lineStart = Number.isFinite(state.selectedContext.lineStart) ? state.selectedContext.lineStart : "?";
          const lineEnd = Number.isFinite(state.selectedContext.lineEnd) ? state.selectedContext.lineEnd : "?";
          el.selectionText.textContent = `[code cell ${cell}, lines ${lineStart}-${lineEnd}] ${state.selectedText}`;
          return;
        }
        el.selectionText.textContent = state.selectedText;
      }

      function renderNotebookCompletionControl(notebookId) {

      function pushMessage(role, text, meta) {
        state.chatView = "messages";
        state.messages.push({ role, text, meta: meta || {} });
        renderMessages();

      function renderHistorySessionList() {
        const sessions = Array.isArray(state.chatHistorySessions) ? state.chatHistorySessions : [];
        if (!sessions.length) {
          el.chatLog.innerHTML = '<p class="muted-empty">履歴セッションはまだありません。</p>';
          return;
        }

        el.chatLog.innerHTML = `
          <div class="history-session-list">
            ${sessions
              .map((session) => {
                const title = escapeHtml(String(session.title || "Untitled session"));
                const preview = escapeHtml(String(session.preview || ""));
                const meta = `${Number(session.messageCount || 0)} messages ・ ${escapeHtml(formatRelativeVisitTime(session.lastMessageAt || session.createdAt || ""))}`;
                return `
                  <button class="history-session-item" type="button" data-session-id="${escapeHtmlAttribute(session.sessionId || "")}">
                    <span class="history-session-title">${title}</span>
                    <span class="history-session-preview">${preview}</span>
                    <span class="history-session-meta">${meta}</span>
                  </button>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function renderMessages() {
        if (state.chatView === "sessions") {
          renderHistorySessionList();
          return;
        }
        if (!state.messages.length) {
          el.chatLog.innerHTML = "";
          return;
        }

        el.chatLog.innerHTML = state.messages
          .map((message) => {
            const refs = renderMessageMeta(message.meta);
            const avatar = message.role === "assistant" ? "AI" : message.role === "user" ? "You" : "";
            const body =
              message.role === "assistant"
                ? renderAssistantMessageContent(message.text)
                : `<p class=\"msg-text-block\">${escapeHtmlWithLineBreaks(message.text)}</p>`;
            return `
              <div class=\"msg-wrap ${message.role}\">
                <span class=\"msg-avatar\" aria-hidden=\"true\">${avatar}</span>
                <article class=\"msg ${message.role}\">${body}${refs}</article>
              </div>
            `;
          })
          .join("");
        void applyChatSyntaxHighlight();
        el.chatLog.scrollTop = el.chatLog.scrollHeight;
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeHtmlWithLineBreaks(value) {
        return escapeHtml(value).replace(/\n/g, "<br>");
      }

      function normalizeCodeLanguage(raw) {
        const value = String(raw || "").trim().toLowerCase();
        if (!value) return "plaintext";
        if (!/^[a-z0-9_+#.-]{1,24}$/.test(value)) return "plaintext";
        return value;
      }

      function escapeHtmlAttribute(value) {
        return escapeHtml(String(value || ""));
      }

      function renderInlineMarkdown(source) {
        const placeholders = [];
        let text = String(source || "");

        text = text.replace(/`([^`]+)`/g, (_, code) => {
          const token = `@@INLINECODE${placeholders.length}@@`;
          placeholders.push(`<code>${escapeHtml(code)}</code>`);
          return token;
        });

        text = escapeHtml(text);

        text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_, label, href) => {
          return `<a href="${escapeHtmlAttribute(href)}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`;
        });
        text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        text = text.replace(/(^|[^\*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
        text = text.replace(/(^|[^_])_([^_\n]+)_/g, "$1<em>$2</em>");

        placeholders.forEach((html, index) => {
          text = text.split(`@@INLINECODE${index}@@`).join(html);
        });

        return text;
      }

      function splitMessageRefs(refsValue) {
        const raw = String(refsValue || "").trim();
        if (!raw) return [];

        return raw
          .split(/\s+\|\s+/)
          .flatMap((part) => part.split(/\s*,\s*/))
          .map((part) => part.trim())
          .filter(Boolean);
      }

      function renderMessageMeta(meta) {
        if (!meta || typeof meta !== "object") return "";

        const refItems = Array.isArray(meta.refsList)
          ? meta.refsList.map((item) => String(item || "").trim()).filter(Boolean)
          : splitMessageRefs(meta.refs);

        if (!refItems.length) return "";

        return `
          <div class="msg-meta">
            <span class="msg-meta-label">参照:</span>
            <div class="msg-meta-list">
              ${refItems.map((item) => `<span class="msg-meta-item">${escapeHtml(item)}</span>`).join("")}
            </div>
          </div>
        `;
      }

      function renderMarkdownText(text) {
        const normalized = String(text || "").replace(/\r\n/g, "\n").trim();
        if (!normalized) return "";

        const lines = normalized.split("\n");
        const blocks = [];
        let index = 0;

        while (index < lines.length) {
          const line = lines[index];
          const trimmed = line.trim();
          if (!trimmed) {
            index += 1;
            continue;
          }

          const headingMatch = trimmed.match(/^(#{1,6})\s+(.+)$/);
          if (headingMatch) {
            const level = Math.min(6, headingMatch[1].length);
            blocks.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
            index += 1;
            continue;
          }

          if (/^\s*>\s?/.test(line)) {
            const quoteLines = [];
            while (index < lines.length && /^\s*>\s?/.test(lines[index])) {
              quoteLines.push(lines[index].replace(/^\s*>\s?/, ""));
              index += 1;
            }
            blocks.push(`<blockquote>${renderMarkdownText(quoteLines.join("\n"))}</blockquote>`);
            continue;
          }

          if (/^\s*[-*+]\s+/.test(line)) {
            const items = [];
            while (index < lines.length && /^\s*[-*+]\s+/.test(lines[index])) {
              items.push(`<li>${renderInlineMarkdown(lines[index].replace(/^\s*[-*+]\s+/, ""))}</li>`);
              index += 1;
            }
            blocks.push(`<ul>${items.join("")}</ul>`);
            continue;
          }

          if (/^\s*\d+\.\s+/.test(line)) {
            const items = [];
            while (index < lines.length && /^\s*\d+\.\s+/.test(lines[index])) {
              items.push(`<li>${renderInlineMarkdown(lines[index].replace(/^\s*\d+\.\s+/, ""))}</li>`);
              index += 1;
            }
            blocks.push(`<ol>${items.join("")}</ol>`);
            continue;
          }

          const paragraphLines = [];
          while (index < lines.length) {
            const current = lines[index];
            const currentTrimmed = current.trim();
            if (!currentTrimmed) break;
            if (/^(#{1,6})\s+/.test(currentTrimmed) || /^\s*>\s?/.test(current) || /^\s*[-*+]\s+/.test(current) || /^\s*\d+\.\s+/.test(current)) {
              break;
            }
            paragraphLines.push(currentTrimmed);
            index += 1;
          }
          blocks.push(`<p>${renderInlineMarkdown(paragraphLines.join(" "))}</p>`);
        }

        return blocks.join("");
      }

      function splitAssistantMessageSegments(text) {
        const source = String(text || "");
        const segments = [];
        const fence = /```([A-Za-z0-9_+#.-]*)?[ \t]*\n?([\s\S]*?)```/g;
        let cursor = 0;
        let match;

        while ((match = fence.exec(source)) !== null) {
          if (match.index > cursor) {
            segments.push({ type: "text", text: source.slice(cursor, match.index) });
          }
          segments.push({
            type: "code",
            language: normalizeCodeLanguage(match[1] || ""),
            text: String(match[2] || "").replace(/\n+$/, "")
          });
          cursor = fence.lastIndex;
        }

        if (cursor < source.length) {
          segments.push({ type: "text", text: source.slice(cursor) });
        }
        return segments.length ? segments : [{ type: "text", text: source }];
      }

      function renderAssistantMessageContent(text) {
        const segments = splitAssistantMessageSegments(text);
        const html = segments
          .map((segment) => {
            if (segment.type === "code") {
              const language = normalizeCodeLanguage(segment.language);
              const label = language === "plaintext" ? "code" : language;
              return `
                <div class="msg-code-wrap">
                  <div class="msg-code-label">${escapeHtml(label)}</div>
                  <pre class="msg-code-block"><code class="language-${escapeHtml(language)}">${escapeHtml(segment.text)}</code></pre>
                </div>
              `;
            }

            if (!String(segment.text || "").trim()) return "";
            return `<div class="msg-text-block">${renderMarkdownText(String(segment.text).trim())}</div>`;
          })
          .join("");

        if (html) return html;
        return `<div class="msg-text-block">${renderMarkdownText(String(text || ""))}</div>`;
      }

      async function applyChatSyntaxHighlight() {
        const blocks = el.chatLog.querySelectorAll(".msg-code-block > code");
        if (!blocks.length) return;
        try {
          const hljs = await ensureHighlightLibrary();
          if (!hljs) return;
          blocks.forEach((block) => {
            if (block.dataset && block.dataset.highlighted) {
              delete block.dataset.highlighted;
            }
            block.classList.remove("hljs");
            hljs.highlightElement(block);
          });
        } catch {}
      }

      async function pollAnswer(questionId, token) {
        for (let i = 0; i < 25; i += 1) {
          const response = await fetch(`${API_BASE}/api/questions/${encodeURIComponent(questionId)}/answer`, {
            headers: { Authorization: `Bearer ${token}` }
          });

          if (response.status === 202) {
            await new Promise((resolve) => setTimeout(resolve, 1200));
            continue;
          }

          if (!response.ok) {
            let error = "回答の取得に失敗しました";
            try {
              const payload = await response.json();
              if (payload && payload.error) error = payload.error;
            } catch {}
            throw new Error(error);
          }

          return response.json();
        }

        throw new Error("回答待機がタイムアウトしました");
      }

      async function completeAssistantChat(questionText, notebookId, sectionId, target) {
        const token = getToken();
        if (!token) {
          throw new Error("セッションが切れています。再ログインしてください。");
        }

        const provider = target.provider;
        const modelId = target.modelId || "";
        const sessionId = state.chatSessionId || crypto.randomUUID();
        const body = {
          notebookId,
          sectionId,
          questionText,
          sessionId,
          provider,
          modelId
        };

        if (provider === "openai") {
          const apiKey = String(state.llmSettings.openaiApiKey || "").trim();
          if (!apiKey) {
            throw new Error(assistantApiKeyHelpText());
          }
          body.apiKey = apiKey;
        }

        if (provider === "gemini") {
          const apiKey = String(state.llmSettings.geminiApiKey || "").trim();
          if (!apiKey) {
            throw new Error(assistantApiKeyHelpText());
          }
          body.apiKey = apiKey;
        }

        const response = await fetch(`${API_BASE}/api/chat/complete`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify(body)
        });

        let payload = {};
        try {
          payload = await response.json();
        } catch {}

        if (!response.ok) {
          const message = payload && payload.error ? payload.error : "質問の送信に失敗しました";
          throw new Error(String(message));
        }

        return { ...payload, sessionId: String(payload.sessionId || sessionId) };
      }

      async function sendQuestion() {
        if (state.busy || !state.loggedIn) return;

        const text = el.chatInput.value.trim();
        if (!text) return;

        const notebook = state.activeNotebook;
        if (!notebook) {
          pushMessage("system", "先にサイドバーから教材を選択してください。");
          return;
        }

        const token = getToken();
        if (!token) {
          pushMessage("system", "セッションが切れています。再ログインしてください。");
          setChatOpen(false);
          updateAuthState();
          return;
        }

        const selection = captureSelection();
        if (selection) {
          state.selectedContext = selection;
          state.selectedText = selection.text;
          state.selectedSection = selection.sectionId || "";
          renderSelectionCard();
        }

        const sectionId = state.selectedSection || state.activeSection || "intro";
        const questionText = buildQuestionTextWithSelection(text, state.selectedContext);
        const target = selectedLlmTarget();
        const keyCommand = handleAssistantApiKeyCommand(text, target);
        if (keyCommand.handled) {
          pushMessage(keyCommand.role || "system", keyCommand.message || "");
          el.chatInput.value = "";
          return;
        }

        pushMessage("user", text);
        el.chatInput.value = "";
        state.busy = true;
        el.sendChat.disabled = true;
        el.sendChat.classList.add("is-busy");
        el.sendChat.setAttribute("aria-label", "送信中");
        el.sendChat.setAttribute("title", "送信中");

        try {
          const answer = await completeAssistantChat(questionText, notebook.id, sectionId, target);
          state.chatSessionId = String(answer.sessionId || state.chatSessionId || "");
          const refsList = (answer.sourceReferences || []).map((source) => `${source.notebookId}${source.location}`);
          const meta = { refsList };
          if (target.provider === "bedrock" && Number.isFinite(Number(answer.bedrockRemainingToday))) {
            meta.refsList = refsList.concat(`Bedrock残り ${Number(answer.bedrockRemainingToday)}回/日`);
          }
          pushMessage("assistant", answer.answerText || "回答が空でした", meta);
        } catch (error) {
          pushMessage("system", error instanceof Error ? error.message : "質問処理に失敗しました");
        } finally {
          state.busy = false;
          el.sendChat.disabled = false;
          el.sendChat.classList.remove("is-busy");
          el.sendChat.setAttribute("aria-label", "送信");
          el.sendChat.setAttribute("title", "送信");
        }
      }

      async function loadQuestionHistory() {
        if (!state.loggedIn) {
          window.location.href = "/login";
          return;
        }

        const notebook = state.activeNotebook;
        if (!notebook) {
          pushMessage("system", "先にサイドバーから教材を選択してください。");
          return;
        }

        const token = getToken();
        if (!token) {
          pushMessage("system", "セッションが切れています。再ログインしてください。");
          setChatOpen(false);
          updateAuthState();
          return;
        }

        el.chatHistory.disabled = true;
        const before = el.chatHistory.textContent;
        el.chatHistory.textContent = "Loading...";

        try {
          const response = await fetch(
            `${API_BASE}/api/questions/history?notebookId=${encodeURIComponent(notebook.id)}`,
            { headers: { Authorization: `Bearer ${token}` } }
          );

          if (!response.ok) {
            let error = "履歴の取得に失敗しました";
            try {
              const payload = await response.json();
              if (payload && payload.error) error = payload.error;
            } catch {}
            throw new Error(error);
          }

          const payload = await response.json();
          const sessions = Array.isArray(payload?.sessions) ? payload.sessions : [];

          if (!sessions.length) {
            state.chatView = "sessions";
            state.chatHistorySessions = [];
            renderMessages();
            return;
          }

          state.chatView = "sessions";
          state.chatHistorySessions = sessions;
          renderMessages();
        } catch (error) {
          pushMessage("system", error instanceof Error ? error.message : "履歴の取得に失敗しました");
        } finally {
          el.chatHistory.disabled = false;
          el.chatHistory.textContent = before || "History";
        }
      }

      async function openHistorySession(sessionId) {
        const notebook = state.activeNotebook;
        const token = getToken();
        if (!notebook || !token || !sessionId) {
          return;
        }

        el.chatHistory.disabled = true;
        try {
          const response = await fetch(
            `${API_BASE}/api/questions/history?notebookId=${encodeURIComponent(notebook.id)}&sessionId=${encodeURIComponent(sessionId)}`,
            { headers: { Authorization: `Bearer ${token}` } }
          );

          let payload = {};
          try {
            payload = await response.json();
          } catch {}

          if (!response.ok) {
            throw new Error(payload && payload.error ? payload.error : "履歴の取得に失敗しました");
          }

          const items = Array.isArray(payload?.items) ? payload.items : [];
          state.chatSessionId = String(payload?.sessionId || sessionId);
          state.chatView = "messages";
          state.messages = [];
          items.forEach((item) => {
            if (item.questionText) {
              state.messages.push({ role: "user", text: String(item.questionText), meta: {} });
            }
            if (item.answerText) {
              const refsList = Array.isArray(item.sourceReferences)
                ? item.sourceReferences.map((source) => `${source.notebookId || ""}${source.location || ""}`).filter(Boolean)
                : [];
              state.messages.push({ role: "assistant", text: String(item.answerText), meta: refsList.length ? { refsList } : {} });
            }
          });
          renderMessages();
        } catch (error) {
          pushMessage("system", error instanceof Error ? error.message : "履歴の取得に失敗しました");
        } finally {
          el.chatHistory.disabled = false;
        }
      }

      function moveAssistantPanelToShell() {

          shell.appendChild(el.assistantPanel);

      function syncChatFabState() {
        const catalogReady = Boolean(
          state.catalog &&
          Array.isArray(state.catalog.chapters) &&
          state.catalog.chapters.some((chapter) => Array.isArray(chapter?.notebooks) && chapter.notebooks.length > 0)
        );
        const compactMobile = isCompactMobileView();
        const overlayOpen =
          el.sidebarOverlay.classList.contains("visible") ||
          el.chatOverlay.classList.contains("visible") ||
          el.assistantSettingsOverlay.classList.contains("visible");
        const visible = catalogReady && !overlayOpen && (!state.chatOpen || compactMobile);
        let label = "Assistantを開く";
        if (state.chatOpen) {
          label = "Assistantを閉じる";
        } else if (!state.activeNotebook) {
          label = state.loggedIn ? "最初の教材を開いてAssistantを開始" : "ログインしてAssistantを開始";
        }
        el.chatFab.classList.toggle("visible", visible && !compactMobile);
        if (el.openChatMobile) {
          el.openChatMobile.classList.toggle("is-hidden", !(visible && compactMobile));
          el.openChatMobile.setAttribute("aria-label", label);
          el.openChatMobile.setAttribute("title", label);
        }
        el.chatFab.setAttribute("aria-label", label);
        el.chatFab.setAttribute("title", label);
      }

      async function handleAssistantTriggerClick() {
        if (!state.loggedIn) {
          window.location.href = "/login";
          return;
        }
        if (!state.activeNotebook && !state.chatOpen) {
          const nextNotebookId = getNextNotebookId();
          if (!nextNotebookId) {
            return;
          }
          const opened = await selectNotebook(nextNotebookId);
          if (!opened) {
            return;
          }
          setChatOpen(true);
          return;
        }
        setChatOpen(!state.chatOpen);
      }

      function setChatOpen(open) {
        if (open && !state.loggedIn) {
          window.location.href = "/login";
          return;
        }

        state.chatOpen = Boolean(open);
        const mobile = window.innerWidth <= 960;

        if (mobile) {
          if (state.chatOpen) {
            openMobileChatOverlay();
          } else {
            closeMobileChatOverlay();
          }
          el.resizer.classList.remove("visible");
        } else {
          closeMobileChatOverlay();
          el.resizer.classList.toggle("visible", state.chatOpen);
        }

        el.assistantPanel.classList.toggle("hidden", !state.chatOpen);
        syncChatFabState();
      }

      function startResize(event) {
        if (window.innerWidth <= 960 || !state.chatOpen) return;
        state.resizing = true;
        state.startX = event.clientX;
        state.startWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--assistant-width")) || 400;
        document.body.style.userSelect = "none";
      }

      function onResize(event) {
        if (!state.resizing) return;
        const diff = state.startX - event.clientX;
        const rawWidth = state.startWidth + diff;
        if (rawWidth <= ASSISTANT_CLOSE_THRESHOLD) {
          document.documentElement.style.setProperty("--assistant-width", `${ASSISTANT_MIN_WIDTH}px`);
          setChatOpen(false);
          stopResize();
          return;
        }
        const next = Math.max(ASSISTANT_MIN_WIDTH, Math.min(ASSISTANT_MAX_WIDTH, rawWidth));
        document.documentElement.style.setProperty("--assistant-width", `${next}px`);
      }

      function stopResize() {
        if (!state.resizing) return;
        state.resizing = false;
        document.body.style.userSelect = "";
      }

      async function loadCatalog() {
        const localApiResponse = await fetch("/api/catalog", { cache: "no-cache" }).catch(() => null);
        if (localApiResponse && localApiResponse.ok) {
          return normalizeCatalog(await localApiResponse.json());
        }

        const apiResponse = await fetch(`${API_BASE}/api/catalog`, { cache: "no-cache" }).catch(() => null);
        if (apiResponse && apiResponse.ok) {
          return normalizeCatalog(await apiResponse.json());
        }
        throw new Error("catalog の読み込みに失敗しました");
      }

      function normalizeCatalog(rawCatalog) {
        const catalog = rawCatalog && typeof rawCatalog === "object" ? rawCatalog : {};
        const contentSourceDefaults = {
          kind: "noema-original",
          provider: "Noema",
          license: "internal",
          ...(catalog.contentSourceDefaults && typeof catalog.contentSourceDefaults === "object" ? catalog.contentSourceDefaults : {})
        };
        const chapters = Array.isArray(catalog.chapters) ? catalog.chapters : [];

        return {
          ...catalog,
          contentSourceDefaults,
          chapters: chapters.map((chapter) => {
            const notebooks = Array.isArray(chapter?.notebooks) ? chapter.notebooks : [];
            return {
              ...chapter,
              audience: inferChapterAudience(chapter),
              notebooks: notebooks.map((notebook) => ({
                ...notebook,
                source: {
                  ...contentSourceDefaults,
                  ...(notebook?.source && typeof notebook.source === "object" ? notebook.source : {})
                }
              }))
            };
          })
        };
      }

      function findInitialNotebookId() {
        const q = new URLSearchParams(window.location.search);
        return q.get("notebookId") || "";
      }

      function showHomeDashboard() {
        if (state.chatOpen) {
          setChatOpen(false);
        }
        state.activeNotebook = null;
        state.sectionIds = [];
        state.activeSection = "intro";
        state.selectedText = "";
        state.selectedSection = "";
        state.selectedContext = null;
        state.activeEditorMap = new Map();
        renderSidebar();
        renderHeader();
        renderSections();
        renderSelectionCard();
        renderHomeDashboard();
        syncChatFabState();
        const url = new URL(window.location.href);
        url.searchParams.delete("notebookId");
        window.history.replaceState(null, "", url.toString());
      }

      async function init() {
        updateAuthState();
        renderMessages();

        try {
          state.catalog = await loadCatalog();
        } catch (error) {
          el.notebookContent.innerHTML = `<p class=\"error-text\">${error instanceof Error ? error.message : "初期化エラー"}</p>`;
          return;
        }

        const chapters = notebookList();
        const notebooks = chapters.flatMap((chapter) => chapter.notebooks);
        if (!notebooks.length) {
          el.notebookContent.innerHTML = '<p class="empty-note">教材がありません。</p>';
          return;
        }

        const requested = findInitialNotebookId();
        const requestedNotebook = notebooks.find((nb) => nb.id === requested) || null;

        state.openChapters = {};
        renderSidebar();
        if (requestedNotebook) {
          await selectNotebook(requestedNotebook.id);
        } else {
          showHomeDashboard();
        }
      }

      el.sidebarSearch.addEventListener("input", function (event) {
        state.query = event.target.value || "";
        renderSidebar();
      });

      el.brandHome.addEventListener("click", function (event) {
        event.preventDefault();
        showHomeDashboard();
      });

      el.homeLink.addEventListener("click", function () {
        showHomeDashboard();
      });

      el.homeLinkMobile.addEventListener("click", function () {
        setSidebarOverlayOpen(false);
        showHomeDashboard();
      });

      el.playgroundLink.addEventListener("click", function () {
        void (async () => {
          if (!state.loggedIn) {
            window.location.href = "/login";
            return;
          }
          const nextEnabled = !state.playgroundEnabled;
          await setPlaygroundEnabled(nextEnabled);
          if (nextEnabled && !state.activeNotebook) {
            const firstNotebook = notebookList().flatMap((chapter) => chapter.notebooks)[0];
            if (firstNotebook) {
              await selectNotebook(firstNotebook.id);
            }
          }
        })();
      });

      el.playgroundLinkMobile.addEventListener("click", function () {
        void (async () => {
          setSidebarOverlayOpen(false);
          if (!state.loggedIn) {
            window.location.href = "/login";
            return;
          }
          const nextEnabled = !state.playgroundEnabled;
          await setPlaygroundEnabled(nextEnabled);
          if (nextEnabled && !state.activeNotebook) {
            const firstNotebook = notebookList().flatMap((chapter) => chapter.notebooks)[0];
            if (firstNotebook) {
              await selectNotebook(firstNotebook.id);
            }
          }
        })();
      });

      el.headerTitleSelect.addEventListener("change", function () {
        const notebookId = String(el.headerTitleSelect.value || "").trim();
        if (!notebookId || (state.activeNotebook && state.activeNotebook.id === notebookId)) return;
        void selectNotebook(notebookId);
      });

      el.resetPlayground.addEventListener("click", function () {
        if (!state.activeNotebook) return;
        const shouldReset = window.confirm("プレイグラウンドの編集内容を破棄して初期状態へ戻しますか？");
        if (!shouldReset) return;

        if (state.playgroundSaveTimer) {
          clearTimeout(state.playgroundSaveTimer);
          state.playgroundSaveTimer = null;
        }
        clearNotebookPlaygroundDraft(state.activeNotebook.id);
        applyEditorSourcesForCurrentMode();
        void applySyntaxHighlight(el.notebookContent);
        el.notebookContent.querySelectorAll(".code-output").forEach((output) => {
          output.classList.remove("visible");
          output.replaceChildren();
        });
      });

      el.sectionSelect.addEventListener("change", function () {
        state.activeSection = el.sectionSelect.value;
      });

      el.colabBtn.addEventListener("click", function (event) {
        if (!state.activeNotebook) return;
        if (!state.loggedIn || !state.playgroundEnabled || !state.activeEditorMap.size) return;
        event.preventDefault();
        void openColabWithPlaygroundDraft();
      });

      el.downloadBtn.addEventListener("click", function (event) {
        if (!state.activeNotebook) return;
        if (!state.loggedIn || !state.playgroundEnabled || !state.activeEditorMap.size) return;
        event.preventDefault();
        void (async () => {
          const originalLabel = el.downloadBtn.textContent || "Download";
          el.downloadBtn.textContent = "準備中...";
          el.downloadBtn.setAttribute("aria-disabled", "true");
          try {
            await downloadPlaygroundDraftNotebook();
          } catch (error) {
            console.warn("Download playground draft failed", error);
            window.location.href = buildNotebookDownloadUrl(state.activeNotebook.id);
          } finally {
            el.downloadBtn.textContent = originalLabel;
            el.downloadBtn.removeAttribute("aria-disabled");
          }
        })();
      });

      el.sendChat.addEventListener("click", function () {
        void sendQuestion();
      });

      el.chatInput.addEventListener("keydown", function (event) {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          event.preventDefault();
          void sendQuestion();
        }
      });

      el.clearSelection.addEventListener("click", function () {
        state.selectedText = "";
        state.selectedSection = "";
        state.selectedContext = null;
        renderSelectionCard();
      });

      el.newChat.addEventListener("click", function () {
        state.chatSessionId = "";
        state.chatView = "messages";
        state.chatHistorySessions = [];
        state.messages = [];
        renderMessages();
      });

      el.chatHistory.addEventListener("click", function () {
        void loadQuestionHistory();
      });

      el.chatLog.addEventListener("click", function (event) {
        const target = event.target instanceof Element ? event.target.closest("[data-session-id]") : null;
        if (!target) return;
        const sessionId = String(target.getAttribute("data-session-id") || "").trim();
        if (!sessionId) return;
        void openHistorySession(sessionId);
      });

      if (el.chatModelSelect) {
        el.chatModelSelect.addEventListener("change", function () {
          state.llmSettings = {
            ...state.llmSettings,
            selectedModel: String(el.chatModelSelect.value || "openai:gpt-5-nano")
          };
          writeLlmSettings(state.llmSettings);
        });
      }

      if (el.assistantSettingsClose) {
        el.assistantSettingsClose.addEventListener("click", function () {
          closeAssistantSettings();
        });
      }

      if (el.assistantSettingsOverlay) {
        el.assistantSettingsOverlay.addEventListener("click", function (event) {
          if (event.target === el.assistantSettingsOverlay) {
            closeAssistantSettings();
          }
        });
      }

      if (el.assistantSettingsSave) {
        el.assistantSettingsSave.addEventListener("click", function () {
          writeLlmSettings({
            selectedModel: el.chatModelSelect ? String(el.chatModelSelect.value || "openai:gpt-5-nano") : "openai:gpt-5-nano",
            openaiApiKey: String(el.openAiApiKeyInput ? el.openAiApiKeyInput.value : "").trim(),
            geminiApiKey: String(el.geminiApiKeyInput ? el.geminiApiKeyInput.value : "").trim()
          });
          setLine(el.assistantSettingsStatus, "success", "保存しました。");
          window.setTimeout(() => {
            closeAssistantSettings();
          }, 240);
        });
      }

      if (el.assistantSettingsClear) {
        el.assistantSettingsClear.addEventListener("click", function () {
          writeLlmSettings({
            selectedModel: el.chatModelSelect ? String(el.chatModelSelect.value || "openai:gpt-5-nano") : "openai:gpt-5-nano",
            openaiApiKey: "",
            geminiApiKey: ""
          });
          setLine(el.assistantSettingsStatus, "info", "APIキーをクリアしました。");
        });
      }

      if (el.assistantClose) {
        el.assistantClose.addEventListener("click", function () {
          setChatOpen(false);
        });
      }

      el.chatFab.addEventListener("click", function () {
        void (async () => {
          await handleAssistantTriggerClick();
        })();
      });

      el.openSidebar.addEventListener("click", function () {
        setSidebarOverlayOpen(true);
      });

      if (el.openChatMobile) {
        el.openChatMobile.addEventListener("click", function () {
          void handleAssistantTriggerClick();
        });
      }

      el.closeSidebar.addEventListener("click", function () {
        setSidebarOverlayOpen(false);
      });

      el.sidebarOverlay.addEventListener("click", function (event) {
        if (event.target === el.sidebarOverlay) {
          setSidebarOverlayOpen(false);
        }
      });

      el.chatOverlay.addEventListener("click", function (event) {
        if (event.target === el.chatOverlay) {
          setChatOpen(false);
        }
      });

      el.resizer.addEventListener("mousedown", startResize);
      window.addEventListener("mousemove", onResize);
      window.addEventListener("mouseup", stopResize);
      window.addEventListener("mouseleave", stopResize);

      window.addEventListener("resize", function () {
        if (window.innerWidth <= 960) {
          el.resizer.classList.remove("visible");
          if (state.chatOpen) {
            openMobileChatOverlay();
          }
        } else {
          closeMobileChatOverlay();
          el.assistantPanel.classList.toggle("hidden", !state.chatOpen);
          el.resizer.classList.toggle("visible", state.chatOpen);
        }
        renderPlaygroundSidebarControls();
        if (state.isAdmin) {
          setElementVisibility(el.adminLink, true);
          setElementVisibility(el.adminLinkMobile, !isCompactMobileView());
        }
        syncChatFabState();
        if (!state.activeNotebook) {
          renderHomeDashboard();
        }
      });

      void init();
    })();
  </script>
  <script src="/pwa.js" defer></script>
</body>
</html>
